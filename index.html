<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v5.27 - Vakaa</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 10px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; font-weight: 600; box-sizing: border-box; font-family: inherit; margin-bottom: 12px; }
        .btn-main { background: #000; color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; margin-bottom: 10px; }
        .history-item { background: #fff; padding: 15px; border-radius: 14px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-left: 5px solid #ccc; }
        .actions { display: flex; gap: 8px; margin-top: 10px; border-top: 1px solid #f1f5f9; padding-top: 8px; }
        .btn-edit { background:#eff6ff; border:none; padding:8px 12px; border-radius:6px; color:var(--ac); font-weight:800; cursor:pointer; }
        .btn-del { background:#fff1f2; border:none; padding:8px 12px; border-radius:6px; color:var(--danger); font-weight:800; cursor:pointer; }
        .footer { text-align: center; padding: 20px; color: #94a3b8; font-size: 9px; font-weight: 700; }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" id="t-input" onclick="showPage('input')">Syöte</div>
    <div class="tab" id="t-stats" onclick="showPage('stats')">Arkisto</div>
    <div class="tab" id="t-report" onclick="showPage('report')">Raportit</div>
</div>

<div id="p-input" class="page active">
    <div class="card" id="form-area">
        <input type="hidden" id="f-id">
        <label>Päivämäärä</label><input type="date" id="f-date" class="nextable">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Alku</label><input type="time" id="f-start" class="nextable"></div>
            <div style="flex:1"><label>Loppu</label><input type="time" id="f-end" class="nextable"></div>
        </div>
        <label>Asiakas</label><input type="text" id="f-client" class="nextable">
        <label>Reitti</label><input type="text" id="f-route" class="nextable">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>KM Alku</label><input type="number" id="f-ks" class="nextable"></div>
            <div style="flex:1"><label>KM Loppu</label><input type="number" id="f-ke" class="nextable"></div>
        </div>
        <label>Tyyppi</label>
        <select id="f-type" class="nextable"><option value="Oy">Oy</option><option value="Tmi">Tmi</option><option value="Oma">Oma</option></select>
        <label>Päiväraha</label>
        <select id="f-perdiem" class="nextable"><option value="0">Ei PR</option><option value="25">Osa (25€)</option><option value="54">Koko (54€)</option></select>
        <button class="btn-main" onclick="tallennaKaikki()" style="background: var(--success);">TALLENNA ARKISTOON</button>
    </div>
</div>

<div id="p-stats" class="page"><div id="history-ui">Ladataan...</div></div>
<div id="p-report" class="page"><div id="report-output"></div></div>

<div class="footer">v5.27 PRO | Vakaa versio</div>

<script>
// ALKUPERÄINEN KONFIGURAATIO
const firebaseConfig = { databaseURL: "https://paivuri-6379b-default-rtdb.europe-west1.firebasedatabase.app" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let omatAjot = [];

// --- ENTER-SÄÄNTÖ (HYPPÄÄ SEURAAVAAN) ---
document.getElementById('form-area').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        const inputs = Array.from(document.querySelectorAll('.nextable'));
        const index = inputs.indexOf(e.target);
        if (index > -1 && index < inputs.length - 1) {
            inputs[index + 1].focus(); // Hyppää seuraavaan
        } else {
            tallennaKaikki(); // Tallenna vain jos ollaan viimeisessä tai kaukana
        }
    }
});

function lataaData() {
    db.ref('ajot').on('value', (snapshot) => {
        omatAjot = [];
        snapshot.forEach((child) => {
            let data = child.val();
            data.id = child.key;
            omatAjot.push(data);
        });
        paivitaUI();
    });
}

function tallennaKaikki() {
    const id = document.getElementById('f-id').value || "id_" + Date.now();
    const ajo = {
        date: document.getElementById('f-date').value,
        client: document.getElementById('f-client').value || "Ajo",
        route: document.getElementById('f-route').value || "-",
        ks: parseFloat(document.getElementById('f-ks').value) || 0,
        ke: parseFloat(document.getElementById('f-ke').value) || 0,
        type: document.getElementById('f-type').value,
        perdiem: parseFloat(document.getElementById('f-perdiem').value) || 0
    };
    db.ref('ajot/' + id).set(ajo).then(() => {
        resetForm();
        showPage('stats');
    });
}

function poistaAjo(id) {
    if(confirm("Poistetaanko tämä ajo?")) {
        db.ref('ajot/' + id).remove();
    }
}

function paivitaUI() {
    let h = "";
    [...omatAjot].sort((a,b)=>b.date.localeCompare(a.date)).forEach(e => {
        h += `<div class="history-item" style="border-left-color:${e.type==='Oy'?'#2563eb':'#10b981'}">
            <b>${e.date}</b> | ${e.client}<br><small>${e.route}</small>
            <div class="actions">
                <button class="btn-edit" onclick="muokkaa('${e.id}')">Muokkaa</button>
                <button class="btn-del" onclick="poistaAjo('${e.id}')">Poista</button>
            </div>
        </div>`;
    });
    document.getElementById('history-ui').innerHTML = h || "Arkisto tyhjä.";
}

function muokkaa(id) {
    const a = omatAjot.find(x => x.id === id);
    if(!a) return;
    document.getElementById('f-id').value = a.id;
    document.getElementById('f-date').value = a.date;
    document.getElementById('f-client').value = a.client;
    document.getElementById('f-route').value = a.route;
    document.getElementById('f-ks').value = a.ks;
    document.getElementById('f-ke').value = a.ke;
    document.getElementById('f-type').value = a.type;
    document.getElementById('f-perdiem').value = a.perdiem;
    showPage('input');
}

function resetForm() {
    document.getElementById('f-id').value = "";
    ['f-client','f-route','f-ks','f-ke'].forEach(f => document.getElementById(f).value = "");
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
}

function showPage(p) {
    document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.getElementById('t-' + p).classList.add('active');
}

lataaData();
resetForm();
</script>
</body>
</html>
