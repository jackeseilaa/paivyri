<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v5.59</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --success: #10b981; --km-rate: 0.53; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 11px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; font-weight: 600; box-sizing: border-box; font-family: inherit; margin-bottom: 12px; }
        .btn-main { background: var(--success); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; margin-bottom: 10px; }
        .btn-print { background: #000; color: #fff; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 20px; }
        .report-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 20px; }
        .report-table th { background: #f1f5f9; text-align: left; padding: 8px; border: 1px solid #cbd5e1; }
        .report-table td { padding: 8px; border: 1px solid #cbd5e1; }
        .summary-res { margin-top: 20px; padding: 15px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; font-weight: 600; font-size: 13px; line-height: 1.6; }
        .status-bar { font-size: 10px; text-align: center; padding: 6px; font-weight: 800; position: sticky; top: 0; z-index: 101; }
        @media print { 
            .no-print, .tabs, .status-bar, .btn-print, select, label { display: none !important; }
            .page { display: block !important; padding: 0 !important; }
            .card { border: none !important; padding: 0 !important; }
            .report-header { display: block !important; }
        }
        .report-header { display: none; margin-bottom: 10px; border-bottom: 2px solid #000; }
    </style>
</head>
<body>

<div id="sync-status" class="status-bar" style="background:#fee2e2; color:#b91c1c;">YHDISTETÄÄN PILVEEN...</div>

<div class="tabs no-print">
    <div class="tab active" id="t-input" onclick="showPage('input')">Syöte</div>
    <div class="tab" id="t-stats" onclick="showPage('stats')">Arkisto</div>
    <div class="tab" id="t-report" onclick="showPage('report')">Raportit</div>
</div>

<div id="p-input" class="page active">
    <div class="card">
        <label>Päivämäärä</label><input type="date" id="f-date" class="ent">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Alku</label><input type="time" id="f-ts" class="ent" onchange="laskePaivaraha()"></div>
            <div style="flex:1"><label>Loppu</label><input type="time" id="f-te" class="ent" onchange="laskePaivaraha()"></div>
        </div>
        <label>Asiakas</label><input type="text" id="f-client" class="ent">
        <label>Reitti</label><input type="text" id="f-route" class="ent">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>KM Alku</label><input type="number" id="f-ks" class="ent"></div>
            <div style="flex:1"><label>KM Loppu</label><input type="number" id="f-ke" class="ent"></div>
        </div>
        <label>Yritys</label><select id="f-type" class="ent"><option value="Oy">Oy</option><option value="Tmi">Tmi</option></select>
        <label>Päiväraha</label><select id="f-perdiem" class="ent"><option value="0">0 €</option><option value="25">25 € (Osapäivä)</option><option value="54">54 € (Kokopäivä)</option></select>
        <button class="btn-main" onclick="tallenna()">TALLENNA</button>
    </div>
</div>

<div id="p-stats" class="page"><div id="history-ui"></div></div>

<div id="p-report" class="page">
    <div class="card">
        <div class="no-print">
            <label>Kuukausi</label><select id="f-rep-month" onchange="paivitaUI()"></select>
            <label>Yritys</label><select id="f-rep-type" onchange="paivitaUI()"><option value="Oy">Oy</option><option value="Tmi">Tmi</option></select>
        </div>
        <div id="report-printable">
            <div class="report-header"><h2 id="rep-title">Matkalasku</h2></div>
            <div id="report-table-target"></div>
        </div>
        <button class="btn-print" onclick="window.print()">🖨 TULOSTA RAPORTTI</button>
    </div>
</div>

<script>
// HUOM: Varmista että URL on oikein!
const firebaseConfig = { databaseURL: "https://paivuri-default-rtdb.europe-west1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let omatAjot = [];
const KM_HINTA = 0.53;

// Yhteysseuranta
db.ref(".info/connected").on("value", s => {
    const el = document.getElementById("sync-status");
    if(s.val()) {
        el.innerText = "● PILVIYHTEYS OK";
        el.style.background = "#ecfdf5"; el.style.color = "#065f46";
    } else {
        el.innerText = "○ EI YHTEYTTÄ (Tarkista Firebase)";
        el.style.background = "#fee2e2"; el.style.color = "#b91c1c";
    }
});

function laskePaivaraha() {
    const ts = document.getElementById('f-ts').value;
    const te = document.getElementById('f-te').value;
    if (ts && te) {
        const [h1, m1] = ts.split(':').map(Number);
        const [h2, m2] = te.split(':').map(Number);
        let d = (h2 * 60 + m2) - (h1 * 60 + m1);
        if (d < 0) d += 1440;
        const h = d / 60;
        const sel = document.getElementById('f-perdiem');
        if (h > 10) sel.value = "54"; else if (h > 6) sel.value = "25"; else sel.value = "0";
    }
}

function paivitaUI() {
    let h = "";
    [...omatAjot].sort((a,b)=>b.date.localeCompare(a.date)).forEach(a => {
        h += `<div class="card" style="border-left:8px solid ${a.type=='Oy'?'#2563eb':'#10b981'}; padding:10px; margin-bottom:8px;">
            <b>${a.date}</b> | ${a.client} <br><small>${a.type} | PR: ${a.perdiem}€ | ${(a.ke-a.ks).toFixed(1)} km</small>
        </div>`;
    });
    document.getElementById('history-ui').innerHTML = h;

    const m = document.getElementById('f-rep-month').value;
    const t = document.getElementById('f-rep-type').value;
    const kuukaudet = [...new Set(omatAjot.map(a => a.date.substring(0,7)))].sort().reverse();
    const mSel = document.getElementById('f-rep-month');
    if (mSel.innerHTML === "" && kuukaudet.length > 0) mSel.innerHTML = kuukaudet.map(k => `<option value="${k}">${k}</option>`).join('');

    if(m) {
        const data = omatAjot.filter(a => a.date.startsWith(m) && a.type === t).sort((a,b)=>a.date.localeCompare(b.date));
        document.getElementById('rep-title').innerText = `Matkalasku: ${t} (${m})`;
        
        let tKm=0, tPr=0, c25=0, c54=0;
        let rows = data.map(a => {
            const km = Math.max(0, a.ke - a.ks);
            const pr = parseFloat(a.perdiem||0);
            tKm += km; tPr += pr;
            if(pr === 25) c25++; if(pr === 54) c54++;
            return `<tr><td>${a.date.split('-').reverse().join('.')}</td><td>${a.client}</td><td>${km.toFixed(1)}</td><td>${(km*KM_HINTA).toFixed(2)}€</td><td>${pr}€</td></tr>`;
        }).join('');

        document.getElementById('report-table-target').innerHTML = `
            <table class="report-table">
                <thead><tr><th>PVM</th><th>KOHDE</th><th>KM</th><th>KM €</th><th>PR €</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>
            <div class="summary-res">
                <b>ERITTELY JA YHTEENVETO:</b><br>
                Matkat yhteensä: ${tKm.toFixed(1)} km (${(tKm*KM_HINTA).toFixed(2)} €)<br>
                Osapäivärahat (25€): ${c25} kpl<br>
                Kokopäivärahat (54€): ${c54} kpl<br>
                Päivärahat yhteensä: ${tPr.toFixed(2)} €<br>
                <hr>
                <span style="font-size:16px;">MAKSETTAVA YHTEENSÄ: ${(tKm*KM_HINTA + tPr).toFixed(2)} €</span>
            </div>`;
    }
}

db.ref('ajot').on('value', snap => { omatAjot = snap.val() ? Object.values(snap.val()) : []; paivitaUI(); }, err => console.error(err));

function tallenna() {
    const id = "id_" + Date.now();
    const ajo = {
        id, date: document.getElementById('f-date').value,
        ts: document.getElementById('f-ts').value, te: document.getElementById('f-te').value,
        client: document.getElementById('f-client').value || "-",
        route: document.getElementById('f-route').value || "-",
        ks: parseFloat(document.getElementById('f-ks').value) || 0,
        ke: parseFloat(document.getElementById('f-ke').value) || 0,
        type: document.getElementById('f-type').value,
        perdiem: parseFloat(document.getElementById('f-perdiem').value) || 0
    };
    db.ref('ajot/' + id).set(ajo).then(() => { 
        document.getElementById('f-client').value = "";
        document.getElementById('f-route').value = "";
        showPage('stats'); 
    }).catch(e => alert("Tallennusvirhe! Tarkista Firebase-oikeudet."));
}

function showPage(p) { document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active')); document.getElementById('p-' + p).classList.add('active'); document.getElementById('t-' + p).classList.add('active'); }
document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
