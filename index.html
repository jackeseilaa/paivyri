<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v5.46</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --success: #10b981; --cal: #4285f4; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 10px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; font-weight: 600; box-sizing: border-box; font-family: inherit; margin-bottom: 12px; }
        .btn-main { background: #000; color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; margin-bottom: 10px; }
        .btn-cal { background: var(--cal); color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: 800; width: 100%; cursor: pointer; font-size: 12px; }
        .sync-status { font-size: 9px; text-align: center; padding: 8px; font-weight: 800; transition: 0.3s; }
        .history-item { background: #fff; padding: 15px; border-radius: 14px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-left: 5px solid #ccc; position: relative; }
        .report-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .report-table td { padding: 8px; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div id="sync-msg" class="sync-status" style="background: #eee; color: #666;">ALUSTETAAN...</div>

<div class="tabs">
    <div class="tab active" id="t-input" onclick="showPage('input')">Syöte</div>
    <div class="tab" id="t-stats" onclick="showPage('stats')">Arkisto</div>
    <div class="tab" id="t-report" onclick="showPage('report')">Raportit</div>
</div>

<div id="p-input" class="page active">
    <div class="card">
        <input type="hidden" id="f-id">
        <label>Toimintatila</label>
        <select id="f-mode" onchange="toggleMode()"><option value="meeting">Tapaaminen (CRM)</option><option value="drive">Pelkkä Ajo</option></select>
        <label>Päivämäärä</label><input type="date" id="f-date">
        <div id="crm-fields"><label>Asiakas</label><input type="text" id="f-client"></div>
        <label>Reitti</label><input type="text" id="f-route">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>KM Alku</label><input type="number" id="f-ks"></div>
            <div style="flex:1"><label>KM Loppu</label><input type="number" id="f-ke"></div>
        </div>
        <label>Tyyppi</label><select id="f-type"><option value="Oy">Oy</option><option value="Tmi">Tmi</option><option value="Oma">Oma</option></select>
        <label>Päiväraha</label><select id="f-perdiem"><option value="0">Ei PR</option><option value="25">25€</option><option value="54">54€</option></select>
        <button class="btn-main" onclick="tallenna()" style="background: var(--success)">TALLENNA</button>
        <button class="btn-cal" onclick="vieKalenteriin()">📅 VIE GOOGLE-KALENTERIIN</button>
    </div>
</div>

<div id="p-stats" class="page"><div id="history-ui"></div></div>
<div id="p-report" class="page"><div class="card"><select id="f-report-month" onchange="paivitaUI()"></select><div id="report-output"></div></div></div>

<script>
const firebaseConfig = { databaseURL: "https://paivuri-6379b-default-rtdb.europe-west1.firebasedatabase.app" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Ladataan heti paikallinen muisti, jotta sovellus ei näytä tyhjää
let omatAjot = JSON.parse(localStorage.getItem('paivuri_cache')) || [];

function paivitaUI() {
    // Arkisto
    let h = "";
    [...omatAjot].sort((a,b)=>b.date.localeCompare(a.date)).forEach(a => {
        h += `<div class="history-item"><small>${a.date} | ${a.type}</small><br><b>${a.client}</b><br><small>${a.ks}-${a.ke} km</small>
        <button onclick="muokkaa('${a.id}')" style="border:none; background:none; color:var(--ac); font-weight:800; float:right;">MUOKKAA</button></div>`;
    });
    document.getElementById('history-ui').innerHTML = h || "Ei tietoja.";

    // Raportit
    const kuuSel = document.getElementById('f-report-month');
    const vanhaKuu = kuuSel.value;
    const kuukaudet = [...new Set(omatAjot.map(a => a.date.substring(0, 7)))].sort().reverse();
    kuuSel.innerHTML = kuukaudet.map(k => `<option value="${k}">${k}</option>`).join('') || `<option value="">Ei dataa</option>`;
    if(vanhaKuu) kuuSel.value = vanhaKuu;

    const valittuKuu = kuuSel.value;
    if(!valittuKuu) return;
    let tKm = 0, tPr = 0;
    let table = `<table class="report-table">`;
    omatAjot.filter(a => a.date.startsWith(valittuKuu)).forEach(a => {
        const km = a.ke - a.ks; tKm += km; tPr += a.perdiem;
        table += `<tr><td>${a.date.split('-')[2]}.${a.date.split('-')[1]}</td><td>${a.client}</td><td>${km} km</td></tr>`;
    });
    document.getElementById('report-output').innerHTML = table + `</table><div style="margin-top:10px; font-weight:800; border-top:1px solid #000;">YHT: ${tKm} km / ${tPr} €</div>`;
}

// Synkronointi pilven kanssa
db.ref('ajot').on('value', snap => {
    const data = snap.val();
    if(data) {
        omatAjot = Object.values(data);
        localStorage.setItem('paivuri_cache', JSON.stringify(omatAjot));
        paivitaUI();
    }
});

db.ref(".info/connected").on("value", snap => {
    const el = document.getElementById("sync-msg");
    if(snap.val()) { el.innerText = "● PILVIYHTEYS OK"; el.style.color="#10b981"; el.style.background="#ecfdf5"; }
    else { el.innerText = "○ OFFLINE (Käytetään välimuistia)"; el.style.color="#f59e0b"; el.style.background="#fffbeb"; }
});

function tallenna() {
    const id = document.getElementById('f-id').value || "id_" + Date.now();
    const ajo = {
        id, date: document.getElementById('f-date').value,
        client: document.getElementById('f-client').value || "-",
        route: document.getElementById('f-route').value || "-",
        ks: parseFloat(document.getElementById('f-ks').value) || 0,
        ke: parseFloat(document.getElementById('f-ke').value) || 0,
        type: document.getElementById('f-type').value,
        perdiem: parseFloat(document.getElementById('f-perdiem').value) || 0
    };
    db.ref('ajot/' + id).set(ajo);
    // Päivitetään heti paikallisesti
    const idx = omatAjot.findIndex(x => x.id === id);
    if(idx > -1) omatAjot[idx] = ajo; else omatAjot.push(ajo);
    localStorage.setItem('paivuri_cache', JSON.stringify(omatAjot));
    resetForm(); showPage('stats');
}

function vieKalenteriin() {
    const pvm = document.getElementById('f-date').value.replace(/-/g, '');
    const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(document.getElementById('f-client').value || "Ajo")}&dates=${pvm}/${pvm}&details=${encodeURIComponent(document.getElementById('f-route').value)}`;
    window.open(url, '_blank');
}

function muokkaa(id) {
    const a = omatAjot.find(x => x.id === id);
    if(!a) return;
    ['id','date','client','route','ks','ke','type','perdiem'].forEach(k => {
        const el = document.getElementById('f-' + k);
        if(el) el.value = a[k];
    });
    showPage('input');
}

function showPage(p) {
    document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.getElementById('t-' + p).classList.add('active');
    paivitaUI();
}

function resetForm() {
    ['f-id','f-client','f-route','f-ks','f-ke'].forEach(f => document.getElementById(f).value = "");
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
}

function toggleMode() { document.getElementById('crm-fields').style.display = document.getElementById('f-mode').value === 'meeting' ? 'block' : 'none'; }

resetForm(); toggleMode(); paivitaUI();
</script>
</body>
</html>
