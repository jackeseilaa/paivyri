<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v5.87</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --success: #10b981; --err: #ef4444; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        
        /* Navigointi */
        .status-bar { font-size: 10px; text-align: center; padding: 6px; font-weight: 800; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 27px; z-index: 100; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 11px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        
        /* Kortit */
        .page { display: none; padding: 12px; width: 100%; max-width: 1000px; margin: 0 auto; box-sizing: border-box; }
        .page.active { display: block; }
        .card { background: #fff; padding: 15px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 15px; }
        
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 4px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; font-weight: 600; box-sizing: border-box; font-family: inherit; margin-bottom: 10px; }
        
        .btn-save { background: var(--success); color: white; border: none; padding: 18px; border-radius: 14px; width: 100%; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 5px; }
        .mini-btn { padding: 10px 14px; border-radius: 8px; font-size: 10px; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; margin: 5px 5px 0 0; }
        .edit-btn { background: var(--ac); color: white; }
        .del-btn { background: var(--err); color: white; }

        .stop-row { background: #f1f5f9; padding: 15px; border-radius: 14px; margin-bottom: 12px; border-left: 6px solid var(--ac); position: relative; }
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 15px; background: white; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #f1f5f9; font-size: 10px; }

        @media print { .no-print { display: none !important; } .page { display: block !important; } }
    </style>
</head>
<body>

<div id="sync-status" class="status-bar">YHDISTETÄÄN...</div>

<div class="tabs no-print">
    <div class="tab active" onclick="showPage('input')">Syöte</div>
    <div class="tab" onclick="showPage('crm')">Asiakkaat</div>
    <div class="tab" onclick="showPage('report')">Raportit</div>
</div>

<div id="p-input" class="page active">
    <div class="card">
        <input type="hidden" id="f-id">
        <label>Päivämäärä</label><input type="date" id="f-date" class="ent">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Alku klo</label><input type="time" id="f-ts" class="ent"></div>
            <div style="flex:1"><label>Alku KM</label><input type="number" id="f-ks" class="ent"></div>
        </div>
        
        <div id="stops-container"></div>
        <button class="mini-btn" onclick="addStop()" style="background:var(--ac); color:white; width:100%; margin-bottom:15px; height:45px">+ LISÄÄ PYSÄHDYS</button>

        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Loppu klo</label><input type="time" id="f-te" class="ent"></div>
            <div style="flex:1"><label>Loppu KM</label><input type="number" id="f-ke" class="ent"></div>
        </div>
        <label>Yritys</label>
        <select id="f-type" class="ent"><option value="Tmi">Tmi</option><option value="Oy">Oy</option><option value="Oma">Oma</option></select>
        
        <button class="btn-save" onclick="tallennaPaiva()">TALLENNA PÄIVÄ</button>
        <button class="mini-btn" onclick="vieKalenteriin()" style="background:#4285f4; color:white; width:100%; margin-top:10px">📅 VIE KALENTERIIN</button>
        <button class="mini-btn" onclick="toggleArchive()" style="background:#64748b; color:white; width:100%; margin-top:10px">ARKISTO</button>
    </div>
    <div id="history-ui" style="display:none"></div>
</div>

<div id="p-crm" class="page">
    <div class="card">
        <h3>Asiakastiedot</h3>
        <input type="hidden" id="c-id">
        <label>Nimi</label><input type="text" id="c-name">
        <label>Osoite</label><input type="text" id="c-addr">
        <label>Yhteyshenkilö</label><input type="text" id="c-contact">
        <label>Puhelin</label><input type="tel" id="c-phone">
        <label>Sähköposti</label><input type="email" id="c-email">
        <button class="btn-save" onclick="saveCrmManual()">TALLENNA REKISTERIIN</button>
    </div>
    <div id="crm-list-container"></div>
</div>

<div id="p-report" class="page">
    <div class="card no-print">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Kk</label><select id="rep-month" onchange="paivitaRaportti()"></select></div>
            <div style="flex:1"><label>Tyyppi</label><select id="rep-type" onchange="paivitaRaportti()"><option value="Tmi">Tmi</option><option value="Oy">Oy</option><option value="Oma">Oma</option></select></div>
        </div>
    </div>
    <div id="report-target"></div>
    <button class="btn-save no-print" style="background:#000" onclick="window.print()">TULOSTA PDF</button>
</div>

<datalist id="crm-datalist"></datalist>

<script>
const firebaseConfig = { databaseURL: "https://paivuri-default-rtdb.europe-west1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let omatAjot = [], asiakkaat = [];

// --- ENTER LOGIIKKA ---
document.addEventListener('keydown', e => {
    if(e.key === 'Enter') {
        const active = document.activeElement;
        if(active.classList.contains('ent') || active.tagName === 'INPUT') {
            e.preventDefault();
            const all = Array.from(document.querySelectorAll('#p-input input, #p-input select')).filter(el => el.offsetParent !== null);
            const idx = all.indexOf(active);
            if(idx > -1 && idx < all.length - 1) all[idx+1].focus();
        }
    }
});

// --- PYSÄHDYKSET ---
function addStop(val="", addr="", time="") {
    const container = document.getElementById('stops-container');
    const div = document.createElement('div');
    div.className = 'stop-row';
    div.innerHTML = `
        <span style="float:right;color:red;cursor:pointer" onclick="this.parentElement.remove()">✕</span>
        <label>Klo</label><input type="time" class="s-time" value="${time || new Date().toLocaleTimeString('fi-FI',{hour:'2-digit',minute:'2-digit'})}">
        <label>Asiakas</label><input type="text" class="s-client" value="${val}" list="crm-datalist">
        <label>Osoite</label><input type="text" class="s-addr" value="${addr}">
    `;
    container.appendChild(div);
    div.querySelector('.s-client').focus();
}

// --- CRM ---
function saveCrmManual() {
    const id = document.getElementById('c-id').value;
    const d = {
        name: document.getElementById('c-name').value,
        addr: document.getElementById('c-addr').value,
        contact: document.getElementById('c-contact').value,
        phone: document.getElementById('c-phone').value,
        email: document.getElementById('c-email').value
    };
    if(!d.name) return;
    if(id) db.ref('asiakkaat/'+id).update(d);
    else db.ref('asiakkaat').push(d);
    ['c-id','c-name','c-addr','c-contact','c-phone','c-email'].forEach(i=>document.getElementById(i).value="");
}

db.ref('asiakkaat').on('value', s => {
    asiakkaat = s.val() ? Object.entries(s.val()).map(([id, v]) => ({id, ...v})) : [];
    document.getElementById('crm-datalist').innerHTML = asiakkaat.map(c => `<option value="${c.name}">`).join('');
    document.getElementById('crm-list-container').innerHTML = asiakkaat.map(c => `
        <div class="card">
            <b>${c.name}</b><br><small>${c.addr || ''} | ${c.contact || ''}</small><br>
            <button class="mini-btn edit-btn" onclick="editCrm('${c.id}')">Muokkaa</button>
            <button class="mini-btn del-btn" onclick="if(confirm('Poista?')) db.ref('asiakkaat/${c.id}').remove()">Poista</button>
        </div>`).reverse().join('');
});

function editCrm(id) {
    const c = asiakkaat.find(x=>x.id===id);
    document.getElementById('c-id').value = c.id;
    document.getElementById('c-name').value = c.name;
    document.getElementById('c-addr').value = c.addr || '';
    document.getElementById('c-contact').value = c.contact || '';
    document.getElementById('c-phone').value = c.phone || '';
    document.getElementById('c-email').value = c.email || '';
    window.scrollTo(0,0);
}

// --- AJOT ---
function tallennaPaiva() {
    const id = document.getElementById('f-id').value || "p_" + Date.now();
    const stops = Array.from(document.querySelectorAll('.stop-row')).map(r => ({
        time: r.querySelector('.s-time').value,
        client: r.querySelector('.s-client').value,
        addr: r.querySelector('.s-addr').value
    }));
    const data = {
        id, date: document.getElementById('f-date').value,
        ts: document.getElementById('f-ts').value, te: document.getElementById('f-te').value,
        ks: parseFloat(document.getElementById('f-ks').value) || 0,
        ke: parseFloat(document.getElementById('f-ke').value) || 0,
        type: document.getElementById('f-type').value,
        stops: stops
    };
    db.ref('ajot/'+id).set(data).then(() => { alert("Tallennettu!"); location.reload(); });
}

db.ref('ajot').on('value', s => {
    omatAjot = s.val() ? Object.values(s.val()) : [];
    const mSel = document.getElementById('rep-month');
    const months = [...new Set(omatAjot.filter(a=>a.date).map(a=>a.date.substring(0,7)))].sort().reverse();
    mSel.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
    
    document.getElementById('history-ui').innerHTML = [...omatAjot].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10).map(a => `
        <div class="card" style="font-size:12px">
            <b>${a.date}</b> | ${(a.ke-a.ks).toFixed(1)} km
            <div>
                <button class="mini-btn edit-btn" onclick="editAjo('${a.id}')">Muokkaa</button>
                <button class="mini-btn del-btn" onclick="if(confirm('Poista?')) db.ref('ajot/${a.id}').remove()">Poista</button>
            </div>
        </div>`).join('');
    paivitaRaportti();
});

function editAjo(id) {
    const a = omatAjot.find(x=>x.id===id);
    document.getElementById('f-id').value = a.id;
    document.getElementById('f-date').value = a.date;
    document.getElementById('f-ts').value = a.ts;
    document.getElementById('f-te').value = a.te;
    document.getElementById('f-ks').value = a.ks;
    document.getElementById('f-ke').value = a.ke;
    document.getElementById('f-type').value = a.type;
    document.getElementById('stops-container').innerHTML = "";
    if(a.stops) a.stops.forEach(s => addStop(s.client, s.addr, s.time));
    window.scrollTo(0,0);
}

function paivitaRaportti() {
    const m = document.getElementById('rep-month').value;
    const t = document.getElementById('rep-type').value;
    const data = omatAjot.filter(a => a.date && a.date.startsWith(m) && a.type === t).sort((a,b)=>a.date.localeCompare(b.date));
    let rows = "", total = 0;
    data.forEach(a => {
        const diff = (a.ke - a.ks); total += diff;
        rows += `<tr style="background:#eee;font-weight:bold"><td>${a.date}</td><td>${a.ts}</td><td>ALKU</td><td>Mittari: ${a.ks}</td><td>-</td></tr>`;
        if(a.stops) a.stops.forEach(s => rows += `<tr><td></td><td>${s.time}</td><td>KÄYNTI: ${s.client}</td><td>${s.addr}</td><td>-</td></tr>`);
        rows += `<tr style="border-bottom:2px solid #000"><td></td><td>${a.te}</td><td>LOPPU</td><td>Mittari: ${a.ke}</td><td align="right"><b>${diff.toFixed(1)} km</b></td></tr>`;
    });
    document.getElementById('report-target').innerHTML = `<h3>${t} Raportti: ${m}</h3><table><tr><th>PVM</th><th>KLO</th><th>KUVAUS</th><th>OSOITE</th><th>KM</th></tr>${rows}</table><h4>Yhteensä: ${total.toFixed(1)} km</h4>`;
}

function showPage(p) {
    document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById('p-'+p).classList.add('active');
    if(event) event.target.classList.add('active');
}

function toggleArchive() {
    const h = document.getElementById('history-ui');
    h.style.display = h.style.display === 'none' ? 'block' : 'none';
}

function vieKalenteriin() {
    const pvm = document.getElementById('f-date').value.replace(/-/g, '');
    const k = Array.from(document.querySelectorAll('.s-client')).map(i=>i.value).join(', ');
    window.open(`https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(k || "Ajo")}&dates=${pvm}T080000/${pvm}T160000`);
}

document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
db.ref(".info/connected").on("value", s => { document.getElementById("sync-status").innerText = s.val() ? "● LINJOILLA" : "○ OFFLINE"; });
</script>
</body>
</html>
