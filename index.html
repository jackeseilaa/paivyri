<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v101.2</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --success: #10b981; --err: #ef4444; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        .status-bar { font-size: 10px; text-align: center; padding: 6px; font-weight: 800; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 27px; z-index: 100; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 11px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        .page { display: none; padding: 12px; max-width: 1000px; margin: 0 auto; }
        .page.active { display: block; }
        .card { background: #fff; padding: 15px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 15px; position: relative; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 4px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; font-weight: 600; box-sizing: border-box; margin-bottom: 10px; }
        .btn-save { background: var(--success); color: white; border: none; padding: 18px; border-radius: 14px; width: 100%; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .mini-btn { padding: 8px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; margin-right: 5px; }
        .del-btn { background: var(--err); color: white; padding: 8px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; border: none; cursor: pointer; float: right; }
        .stop-row { background: #f1f5f9; padding: 15px; border-radius: 14px; margin-bottom: 10px; border-left: 6px solid var(--ac); position: relative; }
        .date-container { position: relative; flex: 1.5; }
        .cal-btn { position: absolute; right: 10px; top: 32px; background: none; border: none; font-size: 20px; cursor: pointer; }
        .report-table { width: 100%; border-collapse: collapse; font-size: 11px; background: white; border: 1px solid #000; }
        .report-table th, .report-table td { border: 1px solid #000; padding: 8px; text-align: left; }
        .summary-box { margin-top: 15px; border: 2px solid #000; padding: 15px; font-weight: bold; background: #eee; }
        @media print { .no-print { display: none !important; } .page { display: block !important; } }
    </style>
</head>
<body>

<div id="sync-status" class="status-bar">Ladataan...</div>

<div class="tabs no-print">
    <div id="tab-input" class="tab active" onclick="showPage('input')">Syöte</div>
    <div id="tab-crm" class="tab" onclick="showPage('crm')">Yritykset</div>
    <div id="tab-report" class="tab" onclick="showPage('report')">Raportit</div>
</div>

<div id="p-input" class="page active">
    <div class="card">
        <input type="hidden" id="f-id">
        <label>Yritys / Tyyppi</label>
        <select id="f-type" onchange="toggleQuickMode()" class="e-nav">
            <option value="Tmi">Tmi (Työajo)</option>
            <option value="Oy">Oy (Työajo)</option>
            <option value="Oma">Oma (Pika-ajo)</option>
        </select>

        <div style="display:flex; gap:10px">
            <div class="date-container">
                <label>Päivämäärä</label>
                <input type="date" id="f-date" class="e-nav">
                <button class="cal-btn" onclick="document.getElementById('f-date').showPicker()">📅</button>
            </div>
            <div style="flex:1"><label>Alku KM</label><input type="number" id="f-ks" placeholder="0" class="e-nav"></div>
        </div>

        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Alku klo</label><input type="time" id="f-ts" class="e-nav" onchange="laskePvrahaAutomaatti()"></div>
            <div style="flex:1"><label>Loppu klo</label><input type="time" id="f-te" class="e-nav" onchange="laskePvrahaAutomaatti()"></div>
        </div>

        <div id="work-fields">
            <div id="stops-container"></div>
            <button class="mini-btn" onclick="addStop()" style="background:var(--ac); color:white; width:100%; height:40px; margin-bottom:15px;">+ LISÄÄ ASIAKASKÄYNTI</button>
        </div>

        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Loppu KM</label><input type="number" id="f-ke" placeholder="0" class="e-nav"></div>
            <div style="flex:1"><label>Päiväraha</label>
                <select id="f-allowance" class="e-nav">
                    <option value="-">-</option>
                    <option value="Osapäivä">Osapäivä</option>
                    <option value="Kokopäivä">Kokopäivä</option>
                    <option value="Ateria">Ateria</option>
                </select>
            </div>
        </div>

        <button class="btn-save" onclick="tallennaAjo()">TALLENNA MERKINTÄ</button>
        <button class="mini-btn no-print" onclick="toggleArchive()" style="background:#64748b; color:white; width:100%; margin-top:15px; height:45px">NÄYTÄ ARKISTO / HISTORIA</button>
    </div>
    <div id="history-ui" style="display:none" class="no-print"></div>
</div>

<div id="p-crm" class="page">
    <div class="card">
        <h3>Yritysrekisteri</h3>
        <input type="hidden" id="c-id">
        <label>Yrityksen nimi</label><input type="text" id="c-name" class="c-nav">
        <label>Y-tunnus</label><input type="text" id="c-ytun" class="c-nav" placeholder="1234567-8">
        <label>Osoite</label><input type="text" id="c-addr" class="c-nav">
        <label>Yhteyshenkilö</label><input type="text" id="c-person" class="c-nav">
        <label>Sähköposti</label><input type="email" id="c-email" class="c-nav">
        <label>Puhelin</label><input type="tel" id="c-phone" class="c-nav">
        <button class="btn-save" onclick="saveCrm()">TALLENNA YRITYSTIEDOT</button>
    </div>
    <div id="crm-list-container"></div>
</div>

<div id="p-report" class="page">
    <div id="report-target"></div>
    <button class="btn-save no-print" style="background:#000;" onclick="window.print()">TULOSTA PDF</button>
</div>

<datalist id="crm-datalist"></datalist>

<script>
const firebaseConfig = { databaseURL: "https://paivuri-default-rtdb.europe-west1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let omatAjot = [], asiakkaat = [];
const HINNAT = { "Osapäivä": 24, "Kokopäivä": 51, "Ateria": 12.75, "km": 0.59 };

function esc(s) { return s ? String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : ""; }

document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        const active = document.activeElement;
        if (active.classList.contains('e-nav')) {
            e.preventDefault();
            const all = Array.from(document.querySelectorAll('.e-nav')).filter(el => el.offsetParent !== null);
            const idx = all.indexOf(active);
            if (idx < all.length - 1) all[idx+1].focus(); else tallennaAjo();
        } else if (active.classList.contains('c-nav')) {
            e.preventDefault();
            const all = Array.from(document.querySelectorAll('.c-nav'));
            const idx = all.indexOf(active);
            if (idx < all.length - 1) all[idx+1].focus(); else saveCrm();
        }
    }
});

function toggleQuickMode() {
    const isOma = document.getElementById('f-type').value === 'Oma';
    document.getElementById('work-fields').style.display = isOma ? 'none' : 'block';
}

function addStop(val="", addr="") {
    const div = document.createElement('div');
    div.className = 'stop-row';
    div.innerHTML = `
        <span style="position:absolute; right:10px; top:10px; color:red; cursor:pointer" onclick="this.parentElement.remove()">✕</span>
        <label>Yritys <button class="mini-btn" style="padding:2px 6px; font-size:8px; background:#10b981; color:white" onclick="pikaAsiakas(this)">+ UUSI</button></label>
        <input type="text" class="s-client e-nav" value="${esc(val)}" list="crm-datalist" onchange="autoFillAddr(this)">
        <label>Osoite</label>
        <input type="text" class="s-addr e-nav" value="${esc(addr)}">
    `;
    document.getElementById('stops-container').appendChild(div);
}

function autoFillAddr(input) {
    const loyto = asiakkaat.find(c => c.name === input.value);
    if(loyto) { input.closest('.stop-row').querySelector('.s-addr').value = loyto.addr || ""; }
}

function pikaAsiakas(btn) {
    const n = prompt("Yrityksen nimi:"); if(!n) return;
    const a = prompt("Osoite:") || "";
    db.ref('asiakkaat').push({ name: n, addr: a }).then(() => {
        const row = btn.closest('.stop-row');
        row.querySelector('.s-client').value = n;
        row.querySelector('.s-addr').value = a;
    });
}

function tallennaAjo() {
    const id = document.getElementById('f-id').value || "p_" + Date.now();
    const data = {
        id, date: document.getElementById('f-date').value,
        ks: parseFloat(document.getElementById('f-ks').value) || 0,
        ke: parseFloat(document.getElementById('f-ke').value) || 0,
        ts: document.getElementById('f-ts').value || "",
        te: document.getElementById('f-te').value || "",
        type: document.getElementById('f-type').value,
        allowance: document.getElementById('f-allowance').value,
        stops: Array.from(document.querySelectorAll('.stop-row')).map(r => ({
            client: r.querySelector('.s-client').value, addr: r.querySelector('.s-addr').value
        }))
    };
    db.ref('ajot/'+id).update(data).then(() => { alert("Tallennettu!"); nollaaLomake(); });
}

function nollaaLomake() {
    document.getElementById('f-id').value = "";
    document.getElementById('f-ks').value = document.getElementById('f-ke').value;
    document.getElementById('f-ke').value = "";
    document.getElementById('stops-container').innerHTML = "";
    document.getElementById('f-ts').value = "";
    document.getElementById('f-te').value = "";
    document.getElementById('f-allowance').value = "-";
}

function vieKalenteriin(id) {
    const a = omatAjot.find(x => x.id === id);
    const pvm = a.date.replace(/-/g, '');
    const kohteet = a.stops ? a.stops.map(s => s.client).join(', ') : 'Oma ajo';
    const km = (a.ke - a.ks).toFixed(1);
    
    const otsikko = encodeURIComponent(`Ajopäivä: ${a.type} (${km} km)`);
    const tiedot = encodeURIComponent(`Kohteet: ${kohteet}\nMittari: ${a.ks} - ${a.ke}\nPäiväraha: ${a.allowance}`);
    
    db.ref('ajot/'+id).update({ calExported: true });
    
    const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${otsikko}&dates=${pvm}/${pvm}&details=${tiedot}`;
    window.open(url, '_blank');
}

function laskePvrahaAutomaatti() {
    const s = document.getElementById('f-ts').value, e = document.getElementById('f-te').value;
    if(!s || !e) return;
    let h = (new Date("2000-01-01 "+e) - new Date("2000-01-01 "+s))/(1000*60*60);
    if(h < 0) h += 24;
    const sel = document.getElementById('f-allowance');
    if(h >= 10) sel.value = "Kokopäivä"; else if(h >= 6) sel.value = "Osapäivä"; else sel.value = "-";
}

db.ref('asiakkaat').on('value', s => {
    asiakkaat = s.val() ? Object.entries(s.val()).map(([id, v]) => ({id, ...v})) : [];
    document.getElementById('crm-datalist').innerHTML = asiakkaat.map(c => `<option value="${esc(c.name)}">`).join('');
    document.getElementById('crm-list-container').innerHTML = asiakkaat.map(c => `
        <div class="card">
            <b>${esc(c.name)}</b> ${c.ytun ? '('+esc(c.ytun)+')' : ''}<br>
            <small>${esc(c.addr)} | ${esc(c.person)}</small>
            <div style="margin-top:10px">
                <button onclick="editCrm('${c.id}')" class="mini-btn" style="background:var(--ac);color:white">MUOKKAA</button>
                <button onclick="if(confirm('Poistetaanko yritys?')) db.ref('asiakkaat/${c.id}').remove()" class="del-btn">POISTA</button>
            </div>
        </div>`).join('');
});

db.ref('ajot').on('value', s => {
    omatAjot = s.val() ? Object.values(s.val()) : [];
    const sorted = [...omatAjot].sort((a,b) => b.id.localeCompare(a.id));
    
    document.getElementById('history-ui').innerHTML = sorted.slice(0,15).map(a => {
        const calStyle = a.calExported ? 'background:var(--success);color:white;' : 'background:#eee;color:#000;';
        const calText = a.calExported ? 'VIETY ✅' : 'VIE 📅';
        return `
        <div class="card">
            <b>${esc(a.date)}</b> | ${(a.ke-a.ks).toFixed(1)} km
            <div style="margin-top:10px">
                <button onclick="editAjo('${a.id}')" class="mini-btn" style="background:var(--ac);color:white">MUOKKAA</button>
                <button onclick="vieKalenteriin('${a.id}')" class="mini-btn" style="${calStyle}">${calText}</button>
                <button onclick="if(confirm('Poistetaanko ajo?')) db.ref('ajot/${a.id}').remove()" class="del-btn">POISTA</button>
            </div>
        </div>`;
    }).join('');
    paivitaRaportti();
});

function saveCrm() {
    const id = document.getElementById('c-id').value;
    const data = { 
        name: document.getElementById('c-name').value, 
        ytun: document.getElementById('c-ytun').value || "",
        addr: document.getElementById('c-addr').value || "", 
        person: document.getElementById('c-person').value || "",
        email: document.getElementById('c-email').value || "",
        phone: document.getElementById('c-phone').value || "" 
    };
    if(!data.name) return alert("Nimi pakollinen");
    const ref = id ? db.ref('asiakkaat/'+id) : db.ref('asiakkaat').push();
    ref.set(data).then(() => { alert("Tallennettu!"); resetCrm(); });
}

function resetCrm() { 
    document.getElementById('c-id').value = "";
    ['c-name','c-ytun','c-addr','c-person','c-email','c-phone'].forEach(i=>document.getElementById(i).value=""); 
}

function editCrm(id) {
    const c = asiakkaat.find(x => x.id === id);
    document.getElementById('c-id').value = c.id;
    document.getElementById('c-name').value = c.name;
    document.getElementById('c-ytun').value = c.ytun || "";
    document.getElementById('c-addr').value = c.addr || "";
    document.getElementById('c-person').value = c.person || "";
    document.getElementById('c-email').value = c.email || "";
    document.getElementById('c-phone').value = c.phone || "";
    showPage('crm');
    window.scrollTo(0,0);
}

function editAjo(id) {
    const a = omatAjot.find(x=>x.id===id);
    document.getElementById('f-id').value = a.id;
    document.getElementById('f-date').value = a.date;
    document.getElementById('f-ks').value = a.ks;
    document.getElementById('f-ke').value = a.ke;
    document.getElementById('f-ts').value = a.ts || "";
    document.getElementById('f-te').value = a.te || "";
    document.getElementById('f-type').value = a.type;
    document.getElementById('f-allowance').value = a.allowance || '-';
    document.getElementById('stops-container').innerHTML = "";
    if(a.stops) a.stops.forEach(s => addStop(s.client, s.addr));
    toggleQuickMode();
    showPage('input');
    window.scrollTo(0,0);
}

function paivitaRaportti() {
    const m = new Date().toISOString().substring(0,7);
    const data = omatAjot.filter(a => a.date?.startsWith(m)).sort((a,b)=>a.date.localeCompare(b.date));
    let rows = "", tKm = 0;
    data.forEach(a => {
        const dKm = Math.max(0, (a.ke || 0) - (a.ks || 0));
        tKm += dKm;
        rows += `<tr><td>${esc(a.date)}</td><td>${a.stops?a.stops.map(s=>esc(s.client)).join(','):'-'}</td><td>${dKm.toFixed(1)}</td></tr>`;
    });
    document.getElementById('report-target').innerHTML = `<h3>Kuluva kuu (${m})</h3><table class="report-table"><thead><tr><th>PVM</th><th>KOHDE</th><th>KM</th></tr></thead><tbody>${rows}</tbody></table><div class="summary-box">YHTEENSÄ: ${tKm.toFixed(1)} km</div>`;
}

function showPage(p) {
    document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById('p-'+p).classList.add('active');
    document.getElementById('tab-'+p).classList.add('active');
}

function toggleArchive() {
    const h = document.getElementById('history-ui');
    h.style.display = h.style.display === 'none' ? 'block' : 'none';
}

document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
db.ref(".info/connected").on("value", s => { document.getElementById("sync-status").innerText = s.val() ? "● LINJOILLA (v101.2)" : "○ OFFLINE"; });
</script>
</body>
</html>
