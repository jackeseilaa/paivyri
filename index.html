<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v5.89</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        .no-print { padding: 10px; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .card { background: white; padding: 15px; border-radius: 8px; margin: 10px; border: 1px solid #e2e8f0; }
        
        /* Raportti-tyylit */
        .report-box { background: white; padding: 20px; min-height: 100vh; }
        .rep-header { border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 20px; }
        th, td { border: 1px solid #000; padding: 6px; text-align: left; }
        th { background: #eee; }
        .summary-table { width: auto; margin-left: auto; min-width: 250px; }
        .summary-table td { font-weight: bold; }
        
        input, select { padding: 10px; border-radius: 6px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn { background: var(--ac); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; }
        
        @media print { 
            .no-print, .tabs { display: none !important; } 
            body { background: white; padding: 0; }
            .report-box { padding: 0; }
            table { font-size: 10px; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <div style="display:flex; gap:10px; margin-bottom:10px">
        <button class="btn" style="flex:1" onclick="showPage('input')">SYÖTE</button>
        <button class="btn" style="flex:1" onclick="showPage('report')">RAPORTIT</button>
    </div>
    <div id="report-controls" style="display:none">
        <div style="display:flex; gap:10px">
            <select id="rep-month" onchange="paivitaRaportti()"></select>
            <select id="rep-type" onchange="paivitaRaportti()">
                <option value="Tmi">Tmi</option><option value="Oy">Oy</option><option value="Oma">Oma</option>
            </select>
        </div>
        <button class="btn" style="background:black; margin-top:5px" onclick="window.print()">TULOSTA / PDF</button>
    </div>
</div>

<div id="p-input" class="page">
    <div class="card">
        <input type="hidden" id="f-id">
        <label>Päivä & Yritys</label>
        <div style="display:flex; gap:5px">
            <input type="date" id="f-date" style="flex:2">
            <select id="f-type" style="flex:1"><option value="Tmi">Tmi</option><option value="Oy">Oy</option><option value="Oma">Oma</option></select>
        </div>
        
        <label>Kilometrit</label>
        <div style="display:flex; gap:5px">
            <input type="number" id="f-ks" placeholder="Alku KM">
            <input type="number" id="f-ke" placeholder="Loppu KM">
        </div>

        <label>Päiväraha / Korvaus</label>
        <select id="f-allowance">
            <option value="none">Ei päivärahaa</option>
            <option value="osa">Osapäiväraha (>6h)</option>
            <option value="koko">Kokopäiväraha (>10h)</option>
            <option value="ateria">Ateriakorvaus</option>
        </select>

        <div id="stops-container"></div>
        <button onclick="addStop()" style="margin-bottom:15px; padding:10px; width:100%">+ LISÄÄ KOHDE / ASIAKAS</button>

        <button class="btn" style="background:green" onclick="tallennaAjo()">TALLENNA</button>
    </div>
</div>

<div id="p-report" class="page" style="display:none">
    <div class="report-box" id="report-target">
        <p style="text-align:center">Valitse kuukausi ja yritys ylhäältä.</p>
    </div>
</div>

<datalist id="crm-datalist"></datalist>

<script>
const firebaseConfig = { databaseURL: "https://paivuri-default-rtdb.europe-west1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let omatAjot = [], asiakkaat = [];

// Päivärahahinnat 2024
const HINNAT = { osa: 24.00, koko: 51.00, ateria: 12.75, km: 0.57 };

function addStop(val="", addr="", time="") {
    const container = document.getElementById('stops-container');
    const div = document.createElement('div');
    div.className = 'card';
    div.style.background = "#f1f5f9";
    div.innerHTML = `
        <input type="text" class="s-client" value="${val}" placeholder="Asiakkaan nimi" list="crm-datalist">
        <input type="text" class="s-addr" value="${addr}" placeholder="Osoite">
    `;
    container.appendChild(div);
}

function tallennaAjo() {
    const id = document.getElementById('f-id').value || "p_" + Date.now();
    const stops = Array.from(document.querySelectorAll('#stops-container .card')).map(c => ({
        client: c.querySelector('.s-client').value,
        addr: c.querySelector('.s-addr').value
    }));
    const data = {
        id, date: document.getElementById('f-date').value,
        ks: parseFloat(document.getElementById('f-ks').value) || 0,
        ke: parseFloat(document.getElementById('f-ke').value) || 0,
        type: document.getElementById('f-type').value,
        allowance: document.getElementById('f-allowance').value,
        stops: stops
    };
    db.ref('ajot/'+id).set(data).then(() => { alert("Tallennettu!"); location.reload(); });
}

function paivitaRaportti() {
    const m = document.getElementById('rep-month').value;
    const t = document.getElementById('rep-type').value;
    const data = omatAjot.filter(a => a.date && a.date.startsWith(m) && a.type === t).sort((a,b)=>a.date.localeCompare(b.date));
    
    let rows = "", tKm = 0, cOsa = 0, cKoko = 0, cAteria = 0;

    data.forEach(a => {
        const km = a.ke - a.ks;
        tKm += km;
        if(a.allowance === 'osa') cOsa++;
        if(a.allowance === 'koko') cKoko++;
        if(a.allowance === 'ateria') cAteria++;

        const kohteet = a.stops ? a.stops.map(s => `${s.client} (${s.addr})`).join(', ') : '-';
        
        rows += `
            <tr>
                <td>${a.date.split('-').reverse().join('.')}</td>
                <td>Mittari: ${a.ks} - ${a.ke}</td>
                <td>${kohteet}</td>
                <td align="right">${km.toFixed(1)}</td>
                <td>${a.allowance !== 'none' ? a.allowance : ''}</td>
            </tr>`;
    });

    const kmEur = tKm * HINNAT.km;
    const osaEur = cOsa * HINNAT.osa;
    const kokoEur = cKoko * HINNAT.koko;
    const ateriaEur = cAteria * HINNAT.ateria;
    const kokonaissumma = kmEur + osaEur + kokoEur + ateriaEur;

    document.getElementById('report-target').innerHTML = `
        <div class="rep-header">
            <h2 style="margin:0">MATKALASKU JA AJOPÄIVÄKIRJA</h2>
            <p>Kausi: ${m} | Yritys: ${t}</p>
        </div>
        <table>
            <thead>
                <tr><th>PVM</th><th>REITTI / MITTARI</th><th>ASIAKKAAT JA KOHTEET</th><th>KM</th><th>PÄIVÄRAHA</th></tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>
        
        <table class="summary-table">
            <tr><td>Kilometrikorvaus (${tKm.toFixed(1)} km x ${HINNAT.km}€)</td><td align="right">${kmEur.toFixed(2)} €</td></tr>
            ${cOsa > 0 ? `<tr><td>Osapäivärahat (${cOsa} kpl)</td><td align="right">${osaEur.toFixed(2)} €</td></tr>` : ''}
            ${cKoko > 0 ? `<tr><td>Kokopäivärahat (${cKoko} kpl)</td><td align="right">${kokoEur.toFixed(2)} €</td></tr>` : ''}
            ${cAteria > 0 ? `<tr><td>Ateriakorvaukset (${cAteria} kpl)</td><td align="right">${ateriaEur.toFixed(2)} €</td></tr>` : ''}
            <tr style="font-size:14px; background:#eee"><td>MAKSETTAVA YHTEENSÄ</td><td align="right">${kokonaissumma.toFixed(2)} €</td></tr>
        </table>
        <div style="margin-top:50px; border-top:1px solid #000; width:200px; font-size:10px">Allekirjoitus ja nimenselvennys</div>
    `;
}

function showPage(p) {
    document.querySelectorAll('.page').forEach(el => el.style.display = 'none');
    document.getElementById('p-'+p).style.display = 'block';
    document.getElementById('report-controls').style.display = p === 'report' ? 'block' : 'none';
    if(p === 'report') paivitaRaportti();
}

db.ref('ajot').on('value', s => {
    omatAjot = s.val() ? Object.values(s.val()) : [];
    const months = [...new Set(omatAjot.filter(a=>a.date).map(a=>a.date.substring(0,7)))].sort().reverse();
    document.getElementById('rep-month').innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
    paivitaRaportti();
});

db.ref('asiakkaat').on('value', s => {
    asiakkaat = s.val() ? Object.values(s.val()) : [];
    document.getElementById('crm-datalist').innerHTML = asiakkaat.map(c => `<option value="${c.name}">`).join('');
});

document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
showPage('input');
</script>
</body>
</html>
