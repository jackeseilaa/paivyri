<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0f1117"/>
<title>Päivyri</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0f1117;color:#e8eaf0;font-family:system-ui,sans-serif;font-size:15px}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.15);border-top-color:#4f9cf9;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#status{font-size:13px;color:#7a8099;text-align:center;max-width:320px;line-height:1.6}
#btn-login{display:none;background:#fff;color:#111;border:none;border-radius:12px;padding:14px 28px;font-size:15px;font-weight:600;cursor:pointer;width:100%;max-width:300px}
#err{display:none;font-size:12px;color:#f87171;text-align:center;max-width:300px}
#app{display:none;width:100%;max-width:400px;text-align:center}
#app h2{font-size:20px;margin-bottom:8px}
#app p{font-size:13px;color:#7a8099}
</style>
</head>
<body>
<div class="spinner" id="spin"></div>
<div id="status">Ladataan Firebase...</div>
<button id="btn-login" onclick="doLogin()">Kirjaudu Google-tunnuksilla</button>
<div id="err"></div>
<div id="app">
  <h2>✅ Kirjautunut!</h2>
  <p id="user-info"></p>
  <button onclick="doLogout()" style="margin-top:16px;background:#f87171;color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer">Kirjaudu ulos</button>
</div>

<script type="module">
const log = msg => { document.getElementById('status').textContent = msg; console.log(msg); };
const err = msg => { const e = document.getElementById('err'); e.textContent = msg; e.style.display='block'; console.error(msg); };

log('Importoidaan Firebase...');

try {
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
  log('firebase-app OK');
  
  const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
  log('firebase-auth OK');

  const FB = {
    apiKey: "AIzaSyCjoOqjTZxYoTA0b9HN-QAUB79pqHj5uBc",
    authDomain: "paivuri.firebaseapp.com",
    projectId: "paivuri",
    storageBucket: "paivuri.firebasestorage.app",
    messagingSenderId: "602861240385",
    appId: "1:602861240385:web:f215c3b44388ddfe9346c0"
  };

  log('initializeApp...');
  const app = initializeApp(FB);
  log('getAuth...');
  const auth = getAuth(app);
  log('onAuthStateChanged rekisteröidään...');

  onAuthStateChanged(auth, user => {
    document.getElementById('spin').style.display = 'none';
    if (user) {
      log('Kirjautunut: ' + user.email);
      document.getElementById('app').style.display = 'block';
      document.getElementById('user-info').textContent = user.email;
      document.getElementById('btn-login').style.display = 'none';
    } else {
      log('Ei kirjautumista — näytetään nappi');
      document.getElementById('btn-login').style.display = 'block';
    }
  });

  window.doLogin = async () => {
    log('Yritetään kirjautumista...');
    try {
      await signInWithPopup(auth, new GoogleAuthProvider());
    } catch(e) {
      err('Kirjautumisvirhe: ' + e.code + ' — ' + e.message);
    }
  };
  window.doLogout = async () => { await signOut(auth); };

} catch(e) {
  document.getElementById('spin').style.display = 'none';
  err('VIRHE: ' + e.message);
  log('Firebase lataus epäonnistui');
}
</script>
</body>
</html>
