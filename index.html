<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v5.48</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --ac: #2563eb; --success: #10b981; --err: #ef4444; }
        * { box-sizing: border-box; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        .status-bar { font-size: 10px; text-align: center; padding: 6px; font-weight: 800; background: #fff; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 2000; }
        .user-bar { display: flex; justify-content: space-between; align-items: center; padding: 4px 15px; background: #fff; border-bottom: 1px solid #f1f5f9; }
        .logout-btn { font-size: 9px; border: none; background: none; cursor: pointer; color: var(--err); font-weight: 800; padding: 4px 8px; }
        #auth-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 30px; text-align: center; }
        #auth-page h1 { font-size: 32px; margin-bottom: 8px; }
        #auth-page p { color: #64748b; margin-bottom: 30px; }
        .btn-save { background: var(--success); color: white; border: none; padding: 18px; border-radius: 14px; width: auto; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 10px; font-family: 'Sora', sans-serif; }
        .btn-save:disabled { background: #94a3b8; cursor: not-allowed; }
        #status-message { margin-top: 20px; font-size: 12px; color: #94a3b8; min-height: 18px; }
    </style>
</head>
<body>

<!-- KIRJAUTUMISSIVU -->
<div id="auth-page">
    <h1 id="app-version-title">Päivyri v5.48</h1>
    <p>Ajopäiväkirja &amp; asiakasrekisteri</p>
    <button class="btn-save" onclick="handleLogin()" style="padding:18px 40px; font-size:15px;">
        KIRJAUDU GOOGLELLA
    </button>
    <div id="status-message"></div>
</div>

<!-- SOVELLUS -->
<div id="app-ui" style="display:none">
    <div class="status-bar">
        <span id="sync-status">● LINJOILLA</span>
    </div>
    <div class="user-bar">
        <span id="user-display">–</span>
        <button class="logout-btn" onclick="handleLogout()">KIRJAUDU ULOS</button>
    </div>
    <div style="padding: 20px; text-align: center;">
        <h2>Tervetuloa Päivyri v5.48!</h2>
        <p>Sovellus on ladattu ja Firebase on yhdistetty.</p>
    </div>
</div>

<script>
// =============================================
// KONFIGURAATIO
// =============================================
const VERSIO = 'v5.48';

const firebaseConfig = {
    apiKey: "AIzaSyCjoOqjTZxYoTA0b9HN-QAUB79pqHj5uBc",
    authDomain: "paivuri.firebaseapp.com",
    databaseURL: "https://paivuri-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "paivuri",
    storageBucket: "paivuri.firebasestorage.app",
    messagingSenderId: "602861240385",
    appId: "1:602861240385:web:f215c3b44388ddfe9346c0"
};

// =============================================
// GLOBAALIT MUUTTUJAT
// =============================================
let db, auth, currentUser = null;
let loginInProgress = false;

// =============================================
// APUFUNKTIOT
// =============================================
function esc(s) {
    if (!s) return '';
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

function updateVersionDisplay() {
    document.title = 'Päivyri ' + VERSIO;
    const vh = document.getElementById('app-version-title');
    if (vh) vh.textContent = 'Päivyri ' + VERSIO;
    const sync = document.getElementById('sync-status');
    if (sync) sync.textContent = '● LINJOILLA (' + VERSIO + ')';
}

function setStatus(msg) {
    const el = document.getElementById('status-message');
    if (el) el.innerText = msg;
    console.log(msg);
}

// =============================================
// FIREBASE ALUSTUS
// =============================================
function initFirebase() {
    if (typeof firebase === 'undefined') {
        setStatus('Ladataan Firebase-kirjastoja...');
        setTimeout(initFirebase, 100);
        return;
    }
    
    try {
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        db = firebase.database();
        auth = firebase.auth();
        
        // Aseta versio
        updateVersionDisplay();
        
        // Kuuntele auth-muutoksia
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('app-ui').style.display = 'block';
                document.getElementById('user-display').innerText = user.email;
                console.log('✅ Kirjautunut: ' + user.email);
                updateVersionDisplay();
            } else {
                document.getElementById('auth-page').style.display = 'flex';
                document.getElementById('app-ui').style.display = 'none';
            }
        });
        
        setStatus('✅ Firebase valmis. Klikkaa KIRJAUDU.');
    } catch (err) {
        console.error('Firebase alustus epäonnistui:', err);
        setStatus('❌ Virhe: ' + err.message);
    }
}

// Käynnistä Firebase-alustus kun Firebase on valmis
// (Poistettu - kutsutaan nyt waitForFirebase():n kautta)

// =============================================
// KIRJAUTUMINEN
// =============================================
function handleLogin() {
    if (loginInProgress) return;
    
    if (!auth) {
        setStatus('Alustetaan... odota');
        setTimeout(handleLogin, 500);
        return;
    }
    
    loginInProgress = true;
    const btn = event.target;
    if (btn) { btn.disabled = true; btn.innerText = 'KIRJAUDUTAAN...'; }

    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
        .catch(err => {
            if (err.code === 'auth/cancelled-popup-request') {
                console.log('Popup peruutettu');
                return;
            }
            if (err.code === 'auth/popup-closed-by-user') {
                console.log('Popup suljettu');
                return;
            }
            alert('Kirjautumisvirhe: ' + err.message);
        })
        .finally(() => {
            loginInProgress = false;
            const btn = document.querySelector('#auth-page button');
            if (btn) { btn.disabled = false; btn.innerText = 'KIRJAUDU GOOGLELLA'; }
        });
}

function handleLogout() {
    if (!confirm('Kirjaudutaanko ulos?')) return;
    if (!auth) return;
    auth.signOut().then(() => {
        document.getElementById('app-ui').style.display = 'none';
        document.getElementById('auth-page').style.display = 'flex';
    });
}
</script>

<!-- Firebase SDK - Latautuu rinnakkain -->
<script async src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script async src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script async src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
// Odota että Firebase on ladattu (max 5 sekuntia)
function waitForFirebase(callback, attempt = 0) {
    if (typeof firebase !== 'undefined') {
        callback();
    } else if (attempt < 50) {
        setTimeout(() => waitForFirebase(callback, attempt + 1), 100);
    } else {
        console.error('❌ Firebase ei ladattu 5 sekuntiin');
        document.getElementById('status-message').innerText = '❌ Firebase ei ladattu. Lataa sivu uudelleen.';
    }
}

waitForFirebase(() => {
    console.log('✅ Firebase löytyi, alustetaan...');
    initFirebase();
});
</script>

</body>
</html>
