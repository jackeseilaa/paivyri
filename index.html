<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v5.43</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --success: #10b981; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 10px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; font-weight: 600; box-sizing: border-box; font-family: inherit; margin-bottom: 12px; }
        .btn-main { background: #000; color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }
        .history-item { background: #fff; padding: 15px; border-radius: 14px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-left: 5px solid #ccc; }
        .actions { display: flex; gap: 8px; margin-top: 10px; border-top: 1px solid #f1f5f9; padding-top: 8px; }
        .btn-act { background: #f1f5f9; border: none; padding: 8px; border-radius: 6px; font-weight: 800; cursor: pointer; font-size: 11px; }
        .sync-info { font-size: 9px; text-align: center; padding: 5px; font-weight: 800; color: #64748b; }
    </style>
</head>
<body>

<div id="sync-msg" class="sync-info">Yhdistetään...</div>

<div class="tabs">
    <div class="tab active" id="t-input" onclick="showPage('input')">Syöte</div>
    <div class="tab" id="t-stats" onclick="showPage('stats')">Arkisto</div>
</div>

<div id="p-input" class="page active">
    <div class="card">
        <input type="hidden" id="f-id">
        <label>Toimintatila</label>
        <select id="f-mode" onchange="toggleMode()">
            <option value="meeting">Tapaaminen (CRM)</option>
            <option value="drive">Pelkkä Ajo</option>
        </select>
        <label>Päivämäärä</label><input type="date" id="f-date">
        <div id="crm-fields">
            <label>Asiakas / Yritys</label><input type="text" id="f-client">
        </div>
        <label>Reitti / Osoite</label><input type="text" id="f-route">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>KM Alku</label><input type="number" id="f-ks"></div>
            <div style="flex:1"><label>KM Loppu</label><input type="number" id="f-ke"></div>
        </div>
        <label>Tyyppi</label>
        <select id="f-type"><option value="Oy">Oy</option><option value="Tmi">Tmi</option><option value="Oma">Oma</option></select>
        <label>Päiväraha</label>
        <select id="f-perdiem"><option value="0">Ei PR</option><option value="25">Osa (25€)</option><option value="54">Koko (54€)</option></select>
        <button class="btn-main" onclick="tallenna()" style="background: var(--success)">TALLENNA</button>
    </div>
</div>

<div id="p-stats" class="page">
    <div id="history-ui"></div>
    <div class="card" style="margin-top:30px; border-style: dashed;">
        <label>Datan tuonti (PVM;ASIAKAS;REITTI;ALKU;LOPPU;TYYPPI;PR)</label>
        <textarea id="import-area" rows="3" placeholder="Liitä data tähän..."></textarea>
        <button class="btn-main" onclick="tuoDatan()" style="background: #475569">TUO RIVIT</button>
    </div>
</div>

<script>
const firebaseConfig = { databaseURL: "https://paivuri-6379b-default-rtdb.europe-west1.firebasedatabase.app" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let omatAjot = [];

// Yhteyden seuranta
db.ref(".info/connected").on("value", snap => {
    document.getElementById("sync-msg").innerText = snap.val() ? "● PILVIYHTEYS OK" : "○ OFFLINE";
});

function toggleMode() {
    document.getElementById('crm-fields').style.display = document.getElementById('f-mode').value === 'meeting' ? 'block' : 'none';
}

function tallenna() {
    const id = document.getElementById('f-id').value || "id_" + Date.now();
    const ajo = {
        id,
        date: document.getElementById('f-date').value,
        client: document.getElementById('f-client').value || "-",
        route: document.getElementById('f-route').value || "-",
        ks: parseFloat(document.getElementById('f-ks').value) || 0,
        ke: parseFloat(document.getElementById('f-ke').value) || 0,
        type: document.getElementById('f-type').value,
        perdiem: parseFloat(document.getElementById('f-perdiem').value) || 0
    };
    db.ref('ajot/' + id).set(ajo).then(() => {
        resetForm();
        showPage('stats');
    });
}

function tuoDatan() {
    const raw = document.getElementById('import-area').value.trim();
    if(!raw) return;
    raw.split('\n').forEach(line => {
        const p = line.split(';');
        if(p.length >= 6) {
            const id = "id_" + Math.random().toString(16).slice(2);
            db.ref('ajot/' + id).set({
                id, date: p[0], client: p[1], route: p[2],
                ks: parseFloat(p[3]), ke: parseFloat(p[4]),
                type: p[5], perdiem: parseFloat(p[6]) || 0
            });
        }
    });
    document.getElementById('import-area').value = "";
    alert("Data tuotu pilveen!");
}

db.ref('ajot').on('value', snap => {
    const data = snap.val();
    omatAjot = data ? Object.values(data) : [];
    paivitaArkisto();
});

function paivitaArkisto() {
    let h = "";
    [...omatAjot].sort((a,b)=>b.date.localeCompare(a.date)).forEach(a => {
        h += `<div class="history-item">
            <small>${a.date} | ${a.type}</small><br><b>${a.client}</b><br><small>${a.ks}-${a.ke} km</small>
            <div class="actions">
                <button class="btn-act" onclick="muokkaa('${a.id}')">Muokkaa</button>
                <button class="btn-act" style="color:red" onclick="poista('${a.id}')">Poista</button>
            </div>
        </div>`;
    });
    document.getElementById('history-ui').innerHTML = h || "Arkisto on tyhjä.";
}

function muokkaa(id) {
    const a = omatAjot.find(x => x.id === id);
    if(!a) return;
    document.getElementById('f-id').value = a.id;
    document.getElementById('f-date').value = a.date;
    document.getElementById('f-client').value = a.client;
    document.getElementById('f-route').value = a.route;
    document.getElementById('f-ks').value = a.ks;
    document.getElementById('f-ke').value = a.ke;
    document.getElementById('f-type').value = a.type;
    document.getElementById('f-perdiem').value = a.perdiem;
    showPage('input');
}

function poista(id) { if(confirm("Poistetaanko?")) db.ref('ajot/' + id).remove(); }

function showPage(p) {
    document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.getElementById('t-' + p).classList.add('active');
}

function resetForm() {
    ['f-id','f-client','f-route','f-ks','f-ke'].forEach(f => document.getElementById(f).value = "");
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
}

resetForm();
toggleMode();
</script>
</body>
</html>
