<script>
// ... (Firebase ja muut samat kuin ennen) ...

const teInput = document.getElementById('f-te');
const saveBtn = document.getElementById('save-btn');

// 1. SEURATAAN KELLONAIKAA REAALIAJASSA
teInput.addEventListener('input', (e) => {
    laskePvrahaAutomaatti();
    
    // Jos aika on syötetty (esim. 14:00), poistetaan "lukitus"
    if (teInput.value && teInput.value.length >= 5) {
        saveBtn.classList.add('btn-ready');
        saveBtn.style.background = "#10b981"; // Vihreä valmiustila
        
        // TÄRKEÄ: Siirretään fokus pois kellosta napille
        // Tämä sulkee selaimen oman kellovalitsimen ja valmistelee Enterin
        setTimeout(() => {
            saveBtn.focus();
        }, 100);
    }
});

// 2. AGGRESSIIVINEN ENTER-KUUNTELIJA
document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        // Jos ollaan tallennusnapilla tai loppuajassa -> avaa modal
        if (document.activeElement === saveBtn || document.activeElement === teInput) {
            e.preventDefault();
            avaaVarmistus();
            return;
        }

        // Jos modal on jo auki -> Tallenna oikeasti
        if (document.getElementById('confirm-modal').style.display === 'flex') {
            e.preventDefault();
            tallennaAjo();
            return;
        }

        // Normaali hyppely kentästä toiseen
        if (e.target.classList.contains('e-nav')) {
            e.preventDefault();
            const all = Array.from(document.querySelectorAll('.e-nav')).filter(el => el.offsetParent !== null);
            const idx = all.indexOf(e.target);
            if (idx < all.length - 1) {
                all[idx+1].focus();
            }
        }
    }
});

function avaaVarmistus() {
    if (!teInput.value) {
        teInput.focus();
        return;
    }
    document.getElementById('confirm-modal').style.display = 'flex';
    // Pakotetaan fokus modalin napille
    setTimeout(() => {
        document.getElementById('modal-confirm-btn').focus();
    }, 200);
}

// ... (tallennaAjo ja muut funktiot) ...
</script>
