<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v5.57</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --success: #10b981; --km-rate: 0.53; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 11px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; font-weight: 600; box-sizing: border-box; font-family: inherit; margin-bottom: 12px; }
        input:focus, select:focus { border-color: var(--ac); outline: none; background: #f8fafc; }
        .btn-main { background: var(--success); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; margin-bottom: 10px; }
        .btn-cal { background: #4285f4; color: #fff; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; font-size: 13px; margin-bottom: 10px; }
        .btn-print { background: #000; color: #fff; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th { text-align: left; border-bottom: 2px solid #000; padding: 8px 2px; }
        td { padding: 8px 2px; border-bottom: 1px solid #eee; }
        .summary-res { margin-top: 20px; padding: 15px; background: #f1f5f9; border-radius: 12px; font-weight: 800; line-height: 1.6; }
        .status-bar { font-size: 9px; text-align: center; padding: 4px; font-weight: 800; }
        #duration-info { font-size: 11px; font-weight: 800; color: var(--ac); margin-bottom: 10px; display: block; }
        @media print { .tabs, .status-bar, .btn-print, .btn-cal, .btn-main, select, label { display: none !important; } .page { display: block !important; padding: 0; } .card { box-shadow: none; border: none; } body { background: #fff; } h2 { display: block !important; } }
        h2 { display: none; margin-top: 0; }
    </style>
</head>
<body>

<div id="sync-status" class="status-bar">YHDISTETÄÄN...</div>

<div class="tabs">
    <div class="tab active" id="t-input" onclick="showPage('input')">Syöte</div>
    <div class="tab" id="t-stats" onclick="showPage('stats')">Arkisto</div>
    <div class="tab" id="t-report" onclick="showPage('report')">Raportit</div>
</div>

<div id="p-input" class="page active">
    <div class="card" id="input-form">
        <input type="hidden" id="f-id">
        <label>Päivämäärä</label><input type="date" id="f-date" class="ent">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Klo Alku</label><input type="time" id="f-ts" class="ent" onchange="laskePaivaraha()"></div>
            <div style="flex:1"><label>Klo Loppu</label><input type="time" id="f-te" class="ent" onchange="laskePaivaraha()"></div>
        </div>
        <span id="duration-info"></span>
        <label>Asiakas / Kohde</label><input type="text" id="f-client" class="ent">
        <label>Reitti</label><input type="text" id="f-route" class="ent">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>KM Alku</label><input type="number" id="f-ks" class="ent" step="0.1"></div>
            <div style="flex:1"><label>KM Loppu</label><input type="number" id="f-ke" class="ent" step="0.1"></div>
        </div>
        <label>Tyyppi</label><select id="f-type" class="ent"><option value="Oy">Oy</option><option value="Tmi">Tmi</option><option value="Oma">Oma</option></select>
        <label>Päiväraha (€)</label><select id="f-perdiem" class="ent"><option value="0">0</option><option value="25">25</option><option value="54">54</option></select>
        <button class="btn-main" onclick="tallenna()">TALLENNA</button>
        <button class="btn-cal" onclick="vieKalenteriin()">📅 VIE KALENTERIIN</button>
    </div>
</div>

<div id="p-stats" class="page"><div id="history-ui"></div></div>

<div id="p-report" class="page">
    <div class="card">
        <div class="no-print">
            <label>Kuukausi</label><select id="f-rep-month" onchange="paivitaUI()"></select>
            <label>Tyyppi</label><select id="f-rep-type" onchange="paivitaUI()"><option value="Oy">Oy</option><option value="Tmi">Tmi</option><option value="Oma">Oma</option></select>
        </div>
        <div id="report-content">
            <h2 id="print-title">Ajopäiväkirja</h2>
            <div id="report-table-target"></div>
        </div>
        <button class="btn-print" onclick="window.print()">🖨 TULOSTA RAPORTTI</button>
    </div>
</div>

<script>
const firebaseConfig = { databaseURL: "https://paivuri-default-rtdb.europe-west1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let omatAjot = [];
const KM_HINTA = 0.53;

// Enter-logiikan toteutus
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        const inputs = Array.from(document.querySelectorAll('.ent'));
        const index = inputs.indexOf(document.activeElement);
        if (index > -1 && index < inputs.length - 1) {
            e.preventDefault();
            inputs[index + 1].focus();
        } else if (index === inputs.length - 1) {
            e.preventDefault();
            tallenna();
        }
    }
});

db.ref(".info/connected").on("value", s => {
    const el = document.getElementById("sync-status");
    el.innerText = s.val() ? "● PILVIYHTEYS OK" : "○ OFFLINE";
    el.style.background = s.val() ? "#ecfdf5" : "#fffbeb";
});

function laskePaivaraha() {
    const ts = document.getElementById('f-ts').value;
    const te = document.getElementById('f-te').value;
    const info = document.getElementById('duration-info');
    const pdSel = document.getElementById('f-perdiem');
    if (ts && te) {
        const [h1, m1] = ts.split(':').map(Number);
        const [h2, m2] = te.split(':').map(Number);
        let diff = (h2 * 60 + m2) - (h1 * 60 + m1);
        if (diff < 0) diff += 1440;
        const hours = diff / 60;
        info.innerText = `Kesto: ${hours.toFixed(2)} tuntia`;
        if (hours > 10) pdSel.value = "54";
        else if (hours > 6) pdSel.value = "25";
        else pdSel.value = "0";
    }
}

function paivitaUI() {
    let h = "";
    [...omatAjot].sort((a,b)=>b.date.localeCompare(a.date)).forEach(a => {
        const diff = (parseFloat(a.ke||0) - parseFloat(a.ks||0)).toFixed(1);
        h += `<div class="card" style="border-left:8px solid ${a.type=='Oy'?'#2563eb':a.type=='Tmi'?'#10b981':'#94a3b8'}; margin-bottom:10px; padding:12px;">
            <small>${a.date} | ${a.ts||''}-${a.te||''}</small><br><b>${a.client}</b><br>
            <small>${diff} km | PR: ${a.perdiem||0}€ | ${a.type}</small>
            <div style="margin-top:10px; display:flex; gap:15px;">
                <span onclick="muokkaa('${a.id}')" style="color:blue; font-weight:800; cursor:pointer; font-size:11px;">MUOKKAA</span>
                <span onclick="poista('${a.id}')" style="color:red; font-weight:800; cursor:pointer; font-size:11px;">POISTA</span>
            </div>
        </div>`;
    });
    document.getElementById('history-ui').innerHTML = h || "Ei merkintöjä.";

    const monthSel = document.getElementById('f-rep-month');
    const typeSel = document.getElementById('f-rep-type');
    const kuukaudet = [...new Set(omatAjot.map(a => a.date.substring(0,7)))].sort().reverse();
    if (monthSel.innerHTML === "" && kuukaudet.length > 0) monthSel.innerHTML = kuukaudet.map(k => `<option value="${k}">${k}</option>`).join('');

    if(monthSel.value) {
        const suodatetut = omatAjot.filter(a => a.date.startsWith(monthSel.value) && a.type === typeSel.value).sort((a,b)=>a.date.localeCompare(b.date));
        document.getElementById('print-title').innerText = `Ajopäiväkirja: ${typeSel.value} - ${monthSel.value}`;
        let tKm = 0, tPr = 0, tEur = 0;
        let rows = "";
        suodatetut.forEach(a => {
            const km = Math.max(0, parseFloat(a.ke||0) - parseFloat(a.ks||0));
            const pr = parseFloat(a.perdiem||0);
            const kmEur = km * KM_HINTA;
            tKm += km; tPr += pr; tEur += kmEur;
            rows += `<tr><td>${a.date.split('-').reverse().join('.')}</td><td>${a.client}</td><td>${km.toFixed(1)}</td><td>${kmEur.toFixed(2)}€</td><td>${pr}€</td></tr>`;
        });
        document.getElementById('report-table-target').innerHTML = `
            <table><thead><tr><th>PVM</th><th>KOHDE</th><th>KM</th><th>KM €</th><th>PR</th></tr></thead>
            <tbody>${rows}</tbody></table>
            <div class="summary-res">
                KUUKAUSI YHTEENSÄ (${typeSel.value}):<br>
                Matka: ${tKm.toFixed(1)} km | Korvaus: ${tEur.toFixed(2)} €<br>
                Päivärahat: ${tPr.toFixed(2)} €<br>
                <span style="font-size:16px; border-top:1px solid #000; display:block; margin-top:5px; padding-top:5px;">MAKSETTAVAA YHT: ${(tEur + tPr).toFixed(2)} €</span>
            </div>`;
    }
}

db.ref('ajot').on('value', snap => {
    omatAjot = snap.val() ? Object.values(snap.val()) : [];
    paivitaUI();
});

function tallenna() {
    const id = document.getElementById('f-id').value || "id_" + Date.now();
    const ajo = {
        id, date: document.getElementById('f-date').value,
        ts: document.getElementById('f-ts').value, te: document.getElementById('f-te').value,
        client: document.getElementById('f-client').value || "-",
        route: document.getElementById('f-route').value || "-",
        ks: parseFloat(document.getElementById('f-ks').value) || 0,
        ke: parseFloat(document.getElementById('f-ke').value) || 0,
        type: document.getElementById('f-type').value,
        perdiem: parseFloat(document.getElementById('f-perdiem').value) || 0
    };
    db.ref('ajot/' + id).set(ajo).then(() => { resetForm(); showPage('stats'); });
}

function muokkaa(id) {
    const a = omatAjot.find(x => x.id === id);
    if(!a) return;
    ['id','date','ts','te','client','route','ks','ke','type','perdiem'].forEach(k => {
        document.getElementById('f-' + k).value = a[k] || (k.includes('k') ? 0 : "");
    });
    laskePaivaraha();
    showPage('input');
}

function poista(id) { if(confirm("Poistetaanko?")) db.ref('ajot/' + id).remove(); }
function vieKalenteriin() {
    const pvm = document.getElementById('f-date').value.replace(/-/g, '');
    const ts = (document.getElementById('f-ts').value || "08:00").replace(':','');
    const te = (document.getElementById('f-te').value || "16:00").replace(':','');
    window.open(`https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(document.getElementById('f-client').value)}&dates=${pvm}T${ts}00/${pvm}T${te}00&details=${encodeURIComponent(document.getElementById('f-route').value)}`, '_blank');
}
function showPage(p) { document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active')); document.getElementById('p-' + p).classList.add('active'); document.getElementById('t-' + p).classList.add('active'); }
function resetForm() { 
    ['f-id','f-client','f-route','f-ks','f-ke','f-ts','f-te'].forEach(f => { document.getElementById(f).value = ""; }); 
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('duration-info').innerText = "";
    document.getElementById('f-perdiem').value = "0";
}
resetForm();
</script>
</body>
</html>
