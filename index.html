<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v4.2</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --success: #10b981; --err: #ef4444; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        #auth-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        #app-ui { display: none; }
        .status-bar { font-size: 10px; text-align: center; padding: 6px; font-weight: 800; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 2000; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 27px; z-index: 1000; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 11px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        .page { display: none; padding: 12px; max-width: 500px; margin: 0 auto; }
        .page.active { display: block; }
        .card { background: #fff; padding: 15px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-top: 12px; margin-bottom: 4px; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; font-weight: 600; box-sizing: border-box; }
        .btn-save { background: var(--success); color: white; border: none; padding: 18px; border-radius: 14px; width: 100%; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 20px; }
        .mini-btn { padding: 12px; border-radius: 8px; font-size: 10px; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; }
        .stop-row { background: #f1f5f9; padding: 15px; border-radius: 14px; margin-bottom: 15px; position: relative; }
        #confirm-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:3000; align-items:center; justify-content:center; padding: 20px; }
        .modal-box { background:white; padding:25px; border-radius:24px; width:100%; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        #modal-confirm-btn:focus { outline: 5px solid var(--ac); background: #059669; }
    </style>
</head>
<body>

<div id="confirm-modal">
    <div class="modal-box">
        <h2 style="margin:0">Tallenna ajo?</h2>
        <p>Paina <b>ENTER</b> tallentaaksesi.</p>
        <button id="modal-confirm-btn" class="btn-save" onclick="tallennaAjo()">KUITTAA JA TALLENNA (ENTER)</button>
        <button class="mini-btn" onclick="suljeModal()" style="margin-top:15px; width:100%; background:#eee;">PERUUTA</button>
    </div>
</div>

<div id="auth-page">
    <h1>Päivyri v4.2</h1>
    <button onclick="login()" style="padding:20px; font-weight:800; cursor:pointer;">KIRJAUDU GOOGLELLA</button>
</div>

<div id="app-ui">
    <div id="sync-status" class="status-bar">Ladataan...</div>
    <div class="tabs">
        <div id="tab-input" class="tab active" onclick="showPage('input')">Syöte</div>
        <div id="tab-crm" class="tab" onclick="showPage('crm')">Yritykset</div>
        <div id="tab-report" class="tab" onclick="showPage('report')">Raportit</div>
    </div>

    <div id="p-input" class="page active">
        <div class="card">
            <input type="hidden" id="f-id">
            <label>PVM & TYYPPI</label>
            <div style="display:flex; gap:10px;">
                <input type="date" id="f-date" class="e-nav" style="flex:1.5">
                <select id="f-type" onchange="toggleQuickMode()" class="e-nav" style="flex:1">
                    <option value="Tmi">Tmi</option><option value="Oy">Oy</option><option value="Oma">Oma</option>
                </select>
            </div>

            <label>LÄHTÖ: KM & AIKA</label>
            <div style="display:flex; gap:10px;">
                <input type="number" id="f-ks" placeholder="Alku KM" class="e-nav" style="flex:1">
                <input type="time" id="f-ts" class="e-nav" style="flex:1">
            </div>

            <div id="work-fields">
                <label>KÄYNNIT</label>
                <div id="stops-container"></div>
                <button onclick="addStop()" class="mini-btn e-nav" style="background:var(--ac); color:white; width:100%; margin-top:10px;">+ LISÄÄ ASIAKAS</button>
            </div>

            <label>PALUU: KM & AIKA</label>
            <div style="display:flex; gap:10px;">
                <input type="number" id="f-ke" placeholder="Loppu KM" class="e-nav" style="flex:1">
                <input type="time" id="f-te" class="e-nav" style="flex:1">
            </div>
            
            <label>PÄIVÄRAHA</label>
            <select id="f-allowance" class="e-nav">
                <option value="-">-</option><option value="Osapäivä">Osapäivä</option><option value="Kokopäivä">Kokopäivä</option><option value="Ateria">Ateria</option>
            </select>

            <button id="save-btn" class="btn-save" onclick="avaaVarmistus()">TALLENNA</button>
        </div>
    </div>
    
    <div id="p-crm" class="page"><div class="card"><h3>Yrityslista</h3><div id="crm-list-container"></div></div></div>
    <div id="p-report" class="page"><div class="card"><h3>Raportti</h3><div id="report-target"></div></div></div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyCjoOqjTZxYoTA0b9HN-QAUB79pqHj5uBc", authDomain: "paivuri.firebaseapp.com", databaseURL: "https://paivuri-default-rtdb.europe-west1.firebasedatabase.app", projectId: "paivuri", storageBucket: "paivuri.firebasestorage.app", messagingSenderId: "602861240385", appId: "1:602861240385:web:f215c3b44388ddfe9346c0" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
let currentUser = null;

function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

auth.onAuthStateChanged(user => {
    if (user) { 
        currentUser = user; 
        document.getElementById('auth-page').style.display='none'; 
        document.getElementById('app-ui').style.display='block';
        alustaAika();
    }
});

// ASETTAA TÄMÄN HETKEN KELLONAJAKSI
function alustaAika() {
    const nyt = new Date();
    const hhmm = nyt.getHours().toString().padStart(2, '0') + ":" + nyt.getMinutes().toString().padStart(2, '0');
    document.getElementById('f-ts').value = hhmm;
    document.getElementById('f-te').value = hhmm;
    document.getElementById('f-date').value = nyt.toISOString().split('T')[0];
}

// ENTER-LOGIIKKA (Korjattu v4.2)
document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        const modal = document.getElementById('confirm-modal');
        
        // Jos varmistusikkuna on auki, Enter painaa nappia
        if (modal.style.display === 'flex') {
            e.preventDefault();
            tallennaAjo();
            return;
        }

        // Jos ollaan loppuajassa, Enter avaa ikkunan
        if (e.target.id === 'f-te') {
            e.preventDefault();
            e.target.blur(); // Sulkee selaimen oman kellovalitsimen
            avaaVarmistus();
            return;
        }

        // Navigointi kentästä toiseen
        if (e.target.classList.contains('e-nav')) {
            e.preventDefault();
            const all = Array.from(document.querySelectorAll('.e-nav')).filter(el => el.offsetParent !== null);
            const idx = all.indexOf(e.target);
            if (idx < all.length - 1) all[idx+1].focus();
        }
    }
});

function avaaVarmistus() {
    laskePvrahaAutomaatti();
    document.getElementById('confirm-modal').style.display = 'flex';
    // PAKOTETAAN FOKUS NAPILLE TALLENNUSTA VARTEN
    setTimeout(() => {
        const btn = document.getElementById('modal-confirm-btn');
        btn.focus();
    }, 150);
}

function suljeModal() { document.getElementById('confirm-modal').style.display = 'none'; }

function tallennaAjo() {
    const id = db.ref('users/'+currentUser.uid+'/ajot').push().key;
    const data = {
        id, date: document.getElementById('f-date').value,
        ks: parseFloat(document.getElementById('f-ks').value)||0, ke: parseFloat(document.getElementById('f-ke').value)||0,
        ts: document.getElementById('f-ts').value, te: document.getElementById('f-te').value,
        type: document.getElementById('f-type').value, allowance: document.getElementById('f-allowance').value,
        stops: Array.from(document.querySelectorAll('.stop-row input')).map(i => ({ client: i.value }))
    };
    db.ref('users/'+currentUser.uid+'/ajot/'+id).set(data).then(() => {
        suljeModal();
        alert("Tallennettu!");
        location.reload(); // Nollaa ja päivittää oletusajat
    });
}

function laskePvrahaAutomaatti() {
    const s = document.getElementById('f-ts').value, e = document.getElementById('f-te').value;
    if(!s || !e) return;
    const [sh, sm] = s.split(':'), [eh, em] = e.split(':');
    let h = (new Date(0,0,0,eh,em) - new Date(0,0,0,sh,sm)) / (1000*60*60);
    if(h < 0) h += 24;
    const sel = document.getElementById('f-allowance');
    if(h >= 10) sel.value = "Kokopäivä"; else if(h >= 6) sel.value = "Osapäivä"; else sel.value = "-";
}

function addStop() {
    const div = document.createElement('div');
    div.className = 'stop-row';
    div.innerHTML = `<input type="text" class="e-nav" placeholder="Asiakas">`;
    document.getElementById('stops-container').appendChild(div);
    div.querySelector('input').focus();
}

function showPage(p) { document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active')); document.getElementById('p-'+p).classList.add('active'); document.getElementById('tab-'+p).classList.add('active'); }
function toggleQuickMode() { document.getElementById('work-fields').style.display = document.getElementById('f-type').value === 'Oma' ? 'none' : 'block'; }
</script>
</body>
</html>
