<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v102.1</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --success: #10b981; --err: #ef4444; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        .status-bar { font-size: 10px; text-align: center; padding: 6px; font-weight: 800; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 27px; z-index: 100; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 11px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        .page { display: none; padding: 12px; max-width: 1000px; margin: 0 auto; }
        .page.active { display: block; }
        .card { background: #fff; padding: 15px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 15px; position: relative; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 4px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; font-weight: 600; box-sizing: border-box; margin-bottom: 10px; }
        .btn-save { background: var(--success); color: white; border: none; padding: 18px; border-radius: 14px; width: 100%; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .mini-btn { padding: 8px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; margin-right: 5px; }
        .del-btn { background: var(--err); color: white; padding: 8px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; border: none; cursor: pointer; float: right; }
        .stop-row { background: #f1f5f9; padding: 15px; border-radius: 14px; margin-bottom: 10px; border-left: 6px solid var(--ac); position: relative; }
        
        /* RAPORTTITYYLIT */
        .report-table { width: 100%; border-collapse: collapse; font-size: 9px; background: white; margin-top: 10px; }
        .report-table th, .report-table td { border: 1px solid #000; padding: 4px; text-align: left; color: #000; }
        .summary-box { margin-top: 15px; border: 2px solid #000; padding: 10px; background: #fff; font-size: 11px; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        
        /* TULOSTUSKORJAUS */
        @media print { 
            .no-print, .tabs, .status-bar, #history-ui, .filter-grid { display: none !important; } 
            body { background: white; padding: 0; }
            .page { display: none !important; }
            #p-report { display: block !important; padding: 0; }
            .card { box-shadow: none; border: none; padding: 0; }
        }
    </style>
</head>
<body>

<div id="sync-status" class="status-bar">Ladataan...</div>

<div class="tabs no-print">
    <div id="tab-input" class="tab active" onclick="showPage('input')">Syöte</div>
    <div id="tab-crm" class="tab" onclick="showPage('crm')">Yritykset</div>
    <div id="tab-report" class="tab" onclick="showPage('report')">Raportit</div>
</div>

<div id="p-input" class="page active">
    <div class="card">
        <input type="hidden" id="f-id">
        <label>Ajon tyyppi / Yritys</label>
        <select id="f-type" onchange="toggleQuickMode()" class="e-nav">
            <option value="Tmi">Tmi (Työajo)</option>
            <option value="Oy">Oy (Työajo)</option>
            <option value="Oma">Oma (Pika-ajo)</option>
        </select>
        <label>Päivämäärä</label>
        <input type="date" id="f-date" class="e-nav">
        <label>Alku KM</label>
        <input type="number" id="f-ks" placeholder="0" class="e-nav">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Alku klo</label><input type="time" id="f-ts" class="e-nav" onchange="laskePvrahaAutomaatti()"></div>
            <div style="flex:1"><label>Loppu klo</label><input type="time" id="f-te" class="e-nav" onchange="laskePvrahaAutomaatti()"></div>
        </div>
        <div id="work-fields">
            <div id="stops-container"></div>
            <button class="mini-btn" onclick="addStop()" style="background:var(--ac); color:white; width:100%; height:45px; margin-bottom:15px;">+ LISÄÄ ASIAKASKÄYNTI</button>
        </div>
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Loppu KM</label><input type="number" id="f-ke" placeholder="0" class="e-nav"></div>
            <div style="flex:1"><label>Päiväraha</label>
                <select id="f-allowance" class="e-nav">
                    <option value="-">-</option>
                    <option value="Osapäivä">Osapäivä</option>
                    <option value="Kokopäivä">Kokopäivä</option>
                    <option value="Ateria">Ateria</option>
                </select>
            </div>
        </div>
        <button id="save-btn" class="btn-save" onclick="tallennaAjo()">TALLENNA MERKINTÄ</button>
        <button class="mini-btn no-print" onclick="toggleArchive()" style="background:#64748b; color:white; width:100%; margin-top:20px; height:45px">NÄYTÄ ARKISTO / HISTORIA</button>
    </div>
    <div id="history-ui" style="display:none" class="no-print"></div>
</div>

<div id="p-crm" class="page">
    <div class="card">
        <h3>Yritysrekisteri</h3>
        <input type="hidden" id="c-id">
        <label>Yrityksen nimi</label><input type="text" id="c-name" class="c-nav">
        <label>Y-tunnus</label><input type="text" id="c-ytun" class="c-nav">
        <label>Osoite</label><input type="text" id="c-addr" class="c-nav">
        <button class="btn-save" onclick="saveCrm()">TALLENNA YRITYSTIEDOT</button>
    </div>
    <div id="crm-list-container"></div>
</div>

<div id="p-report" class="page">
    <div class="no-print">
        <div class="filter-grid">
            <div>
                <label>Kuukausi</label>
                <input type="month" id="rep-month-filter" onchange="paivitaRaportti()">
            </div>
            <div>
                <label>Yhtiö</label>
                <select id="rep-type-filter" onchange="paivitaRaportti()">
                    <option value="Kaikki">Kaikki</option>
                    <option value="Tmi">Tmi</option>
                    <option value="Oy">Oy</option>
                    <option value="Oma">Oma</option>
                </select>
            </div>
        </div>
    </div>
    <div style="text-align:center;">
        <h2 id="report-title-display">AJOPÄIVÄKIRJA</h2>
        <p style="font-size:10px;">Verohallinnon ohjeen mukainen raportti (0,55 €/km)</p>
    </div>
    <div id="report-target"></div>
    <button class="btn-save no-print" style="background:#000;" onclick="window.print()">TULOSTA PDF / ARKISTOI</button>
</div>

<datalist id="crm-datalist"></datalist>

<script>
const firebaseConfig = { databaseURL: "https://paivuri-default-rtdb.europe-west1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let omatAjot = [], asiakkaat = [];
const HINNAT = { "Osapäivä": 24, "Kokopäivä": 51, "Ateria": 12.75, "km": 0.55 };

function esc(s) { if (!s) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

// KALENTERIVIENTI (KORJATTU)
function vieKalenteriin(id) {
    const a = omatAjot.find(x => x.id === id);
    if(!a) return;

    const pvm = a.date.replace(/-/g, '');
    const ts = (a.ts || "08:00").replace(/:/g, '') + "00";
    const te = (a.te || "16:00").replace(/:/g, '') + "00";
    
    // Google vaatii muodon YYYYMMDDTHHMMSS
    const dates = `${pvm}T${ts}/${pvm}T${te}`;
    
    const km = (parseFloat(a.ke||0) - parseFloat(a.ks||0)).toFixed(1);
    const reitti = (a.stops || []).map(s => s.client).join(' -> ');
    
    const otsikko = encodeURIComponent(`Työajo: ${a.type} (${km} km)`);
    const kuvaus = encodeURIComponent(`Reitti: ${reitti}\nMittarilukemat: ${a.ks} - ${a.ke}\nPäiväraha: ${a.allowance}`);
    
    db.ref('ajot/'+id).update({ calExported: true });
    window.open(`https://www.google.com/calendar/render?action=TEMPLATE&text=${otsikko}&dates=${dates}&details=${kuvaus}&sf=true&output=xml`, '_blank');
}

function addStop(val="", addr="") {
    const div = document.createElement('div');
    div.className = 'stop-row';
    div.innerHTML = `
        <span style="position:absolute; right:10px; top:10px; color:red; cursor:pointer" onclick="this.parentElement.remove()">✕</span>
        <label>Yritys</label>
        <input type="text" class="s-client e-nav" value="${esc(val)}" list="crm-datalist" onchange="autoFillAddr(this)">
        <label>Osoite</label>
        <input type="text" class="s-addr e-nav" value="${esc(addr)}">
    `;
    document.getElementById('stops-container').appendChild(div);
}

function autoFillAddr(input) {
    const loyto = asiakkaat.find(c => c.name === input.value);
    if(loyto) { input.closest('.stop-row').querySelector('.s-addr').value = loyto.addr || ""; }
}

function tallennaAjo() {
    const id = document.getElementById('f-id').value || "p_" + Date.now();
    const data = {
        id, date: document.getElementById('f-date').value,
        ks: parseFloat(document.getElementById('f-ks').value) || 0,
        ke: parseFloat(document.getElementById('f-ke').value) || 0,
        ts: document.getElementById('f-ts').value || "",
        te: document.getElementById('f-te').value || "",
        type: document.getElementById('f-type').value,
        allowance: document.getElementById('f-allowance').value,
        stops: Array.from(document.querySelectorAll('.stop-row')).map(r => ({
            client: r.querySelector('.s-client').value, addr: r.querySelector('.s-addr').value
        }))
    };
    db.ref('ajot/'+id).update(data).then(() => { alert("Tallennettu!"); nollaaLomake(); });
}

function nollaaLomake() {
    document.getElementById('f-id').value = "";
    document.getElementById('f-ks').value = document.getElementById('f-ke').value || "";
    document.getElementById('f-ke').value = "";
    document.getElementById('stops-container').innerHTML = "";
}

function laskePvrahaAutomaatti() {
    const s = document.getElementById('f-ts').value, e = document.getElementById('f-te').value;
    if(!s || !e) return;
    let h = (new Date("2000-01-01 "+e) - new Date("2000-01-01 "+s))/(1000*60*60);
    if(h < 0) h += 24;
    const sel = document.getElementById('f-allowance');
    if(h >= 10) sel.value = "Kokopäivä"; else if(h >= 6) sel.value = "Osapäivä"; else sel.value = "-";
}

db.ref('asiakkaat').on('value', s => {
    asiakkaat = s.val() ? Object.entries(s.val()).map(([id, v]) => ({id, ...v})) : [];
    document.getElementById('crm-datalist').innerHTML = asiakkaat.map(c => `<option value="${esc(c.name)}">`).join('');
});

db.ref('ajot').on('value', s => {
    omatAjot = s.val() ? Object.values(s.val()) : [];
    const sorted = [...omatAjot].sort((a,b) => b.date.localeCompare(a.date));
    document.getElementById('history-ui').innerHTML = sorted.slice(-15).reverse().map(a => `
        <div class="card">
            <b>${esc(a.date)}</b> | ${(parseFloat(a.ke||0)-parseFloat(a.ks||0)).toFixed(1)} km
            <div style="margin-top:10px">
                <button onclick="editAjo('${a.id}')" class="mini-btn" style="background:var(--ac);color:white">MUOKKAA</button>
                <button onclick="vieKalenteriin('${a.id}')" class="mini-btn" style="${a.calExported ? 'background:var(--success);color:white':'background:#eee'}">${a.calExported ? '✅ VIETY':'📅 VIE'}</button>
                <button onclick="if(confirm('Poista?')) db.ref('ajot/${a.id}').remove()" class="del-btn">POISTA</button>
            </div>
        </div>`).join('');
    paivitaRaportti();
});

function paivitaRaportti() {
    const selMonth = document.getElementById('rep-month-filter').value;
    const selType = document.getElementById('rep-type-filter').value;
    document.getElementById('report-title-display').innerText = `AJOPÄIVÄKIRJA ${selMonth}`;
    
    let data = omatAjot.filter(a => a.date?.startsWith(selMonth));
    if (selType !== "Kaikki") data = data.filter(a => a.type === selType);
    data.sort((a,b) => a.date.localeCompare(b.date));

    let html = `<table class="report-table"><thead><tr><th>PVM/KLO</th><th>REITTI/TARKOITUS</th><th>LUKEMAT</th><th>KM</th><th>€</th></tr></thead><tbody>`;
    let tKm = 0, tEur = 0;
    data.forEach(a => {
        const km = Math.max(0, (parseFloat(a.ke||0) - parseFloat(a.ks||0)));
        const reitti = (a.stops || []).map(s => esc(s.client)).join(' -> ');
        const korvaus = (km * HINNAT.km) + (HINNAT[a.allowance] || 0);
        tKm += km; tEur += korvaus;
        html += `<tr><td>${a.date}<br>${a.ts}-${a.te}</td><td><b>${a.type}:</b> ${reitti}</td><td>${a.ks}-${a.ke}</td><td>${km.toFixed(1)}</td><td>${korvaus.toFixed(2)}</td></tr>`;
    });
    html += `</tbody></table><div class="summary-box">Kilometrit: ${tKm.toFixed(1)} km (0.55€) | Päivärahat: ${(tEur-(tKm*0.55)).toFixed(2)} €<br><b>YHTEENSÄ: ${tEur.toFixed(2)} €</b></div>`;
    document.getElementById('report-target').innerHTML = data.length > 0 ? html : "<p>Ei ajoja.</p>";
}

function saveCrm() {
    const id = document.getElementById('c-id').value;
    const data = { name: document.getElementById('c-name').value, ytun: document.getElementById('c-ytun').value || "", addr: document.getElementById('c-addr').value || "" };
    db.ref(id ? 'asiakkaat/'+id : 'asiakkaat').update(data).then(() => { alert("Tallennettu!"); });
}

function editAjo(id) {
    const a = omatAjot.find(x=>x.id===id);
    document.getElementById('f-id').value = a.id; document.getElementById('f-date').value = a.date; document.getElementById('f-ks').value = a.ks; document.getElementById('f-ke').value = a.ke; document.getElementById('f-ts').value = a.ts || ""; document.getElementById('f-te').value = a.te || ""; document.getElementById('f-type').value = a.type; document.getElementById('f-allowance').value = a.allowance || '-';
    document.getElementById('stops-container').innerHTML = "";
    if(a.stops) a.stops.forEach(s => addStop(s.client, s.addr));
    showPage('input');
}

function showPage(p) { document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active')); document.getElementById('p-'+p).classList.add('active'); document.getElementById('tab-'+p).classList.add('active'); }
function toggleArchive() { const h = document.getElementById('history-ui'); h.style.display = h.style.display === 'none' ? 'block' : 'none'; }
function toggleQuickMode() { document.getElementById('work-fields').style.display = document.getElementById('f-type').value === 'Oma' ? 'none' : 'block'; }

document.getElementById('rep-month-filter').value = new Date().toISOString().substring(0,7);
document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
db.ref(".info/connected").on("value", s => { document.getElementById("sync-status").innerText = s.val() ? "● LINJOILLA (v102.1)" : "○ OFFLINE"; });
</script>
</body>
</html>
