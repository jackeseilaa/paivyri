<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v5.4</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --ac: #2563eb; --success: #10b981; --err: #ef4444; }
        * { box-sizing: border-box; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }

        /* STATUS & TABS */
        .status-bar { font-size: 10px; text-align: center; padding: 6px; font-weight: 800; background: #fff; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 2000; }
        .user-bar { display: flex; justify-content: space-between; align-items: center; padding: 4px 15px; background: #fff; border-bottom: 1px solid #f1f5f9; }
        .user-bar span { font-size: 9px; font-weight: 800; color: #64748b; }
        .logout-btn { font-size: 9px; border: none; background: none; cursor: pointer; color: var(--err); font-weight: 800; padding: 4px 8px; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 46px; z-index: 1000; }
        .tab { flex: 1; padding: 14px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 11px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f8fafc; }

        /* LAYOUT */
        .page { display: none; padding: 15px; max-width: 900px; margin: 0 auto; }
        .page.active { display: block; }
        .card { background: var(--card); padding: 20px; border-radius: 18px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08); margin-bottom: 15px; }

        /* FORM */
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-top: 12px; margin-bottom: 4px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; font-weight: 600; font-family: 'Sora', sans-serif; background: #fff; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--ac); }
        textarea { resize: vertical; }

        /* BUTTONS */
        .btn-save { background: var(--success); color: white; border: none; padding: 18px; border-radius: 14px; width: 100%; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 10px; font-family: 'Sora', sans-serif; }
        .btn-save:disabled { background: #94a3b8; cursor: not-allowed; }
        .btn-dark { background: #0f172a; color: white; border: none; padding: 18px; border-radius: 14px; width: 100%; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 10px; font-family: 'Sora', sans-serif; }
        .mini-btn { padding: 10px 14px; border-radius: 8px; font-size: 10px; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; font-family: 'Sora', sans-serif; }

        /* MODAL */
        #confirm-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.85); z-index: 3000; align-items: center; justify-content: center; }
        .modal-box { background: white; padding: 30px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; }
        .modal-box h2 { margin: 0 0 8px; font-size: 18px; }
        .modal-box p { color: #64748b; font-size: 13px; margin: 0 0 20px; }

        /* STOP ROWS */
        .stop-row { background: #f8fafc; padding: 12px 14px; border-radius: 12px; margin-bottom: 8px; border: 1px dashed #cbd5e1; }
        .stop-row-top { display: flex; align-items: center; gap: 8px; }
        .stop-row input.stop-input { flex: 1; margin: 0; }
        .stop-del { background: none; border: none; color: #ef4444; font-size: 18px; font-weight: 800; cursor: pointer; padding: 0 4px; line-height: 1; flex-shrink: 0; }
        /* Mini-haku pysähdysrivillä */
        .stop-search-panel { display: none; margin-top: 8px; background: white; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
        .stop-search-panel.open { display: block; }
        .stop-search-input { width: 100%; padding: 10px 12px; border: none; border-bottom: 1px solid #f1f5f9; font-size: 14px; font-family: 'Sora', sans-serif; font-weight: 600; box-sizing: border-box; }
        .stop-search-input:focus { outline: none; }
        .stop-search-results { max-height: 180px; overflow-y: auto; }
        .stop-search-item { padding: 10px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #f8fafc; }
        .stop-search-item:hover { background: #eff6ff; color: var(--ac); }
        .stop-search-item small { color: #94a3b8; font-size: 11px; display: block; }
        .stop-add-new { padding: 10px 12px; cursor: pointer; font-size: 12px; font-weight: 800; color: var(--success); border-top: 1px solid #e2e8f0; display: flex; align-items: center; gap: 6px; }
        .stop-add-new:hover { background: #f0fdf4; }

        /* CRM LIST */
        .crm-item { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #f1f5f9; padding: 14px 0; gap: 10px; }
        .crm-item:last-child { border-bottom: none; }
        .crm-info { flex: 1; min-width: 0; }
        .crm-info b { display: block; font-size: 14px; }
        .crm-info small { color: #64748b; font-size: 11px; line-height: 1.6; }
        .crm-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }

        /* HISTORY */
        .history-item { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .history-item .info { flex: 1; }
        .history-item .info b { font-size: 13px; }
        .history-item .info small { color: #64748b; font-size: 11px; }

        /* REPORT */
        .report-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 15px; background: white; }
        .report-table th { text-align: left; padding: 10px 8px; background: #f8fafc; color: #475569; font-size: 10px; border-bottom: 2px solid #e2e8f0; }
        .report-table td { padding: 10px 8px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
        .report-table tr:last-child td { border-bottom: none; }
        .summary-box { margin-top: 15px; background: #f8fafc; border: 2px solid #0f172a; border-radius: 12px; padding: 15px; font-size: 13px; line-height: 1.8; }
        .summary-box strong { font-size: 16px; }
        .rep-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .rep-stat { background: #f8fafc; border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #e2e8f0; }
        .rep-stat .val { font-size: 22px; font-weight: 800; color: var(--ac); }
        .rep-stat .lbl { font-size: 10px; color: #64748b; font-weight: 800; margin-top: 4px; }

        /* AUTH PAGE */
        #auth-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 30px; text-align: center; }
        #auth-page h1 { font-size: 32px; margin-bottom: 8px; }
        #auth-page p { color: #64748b; margin-bottom: 30px; }

        /* PRINT */
        @media print {
            .no-print, .tabs, .status-bar, .user-bar, #confirm-modal { display: none !important; }
            .page { display: none !important; }
            #p-report { display: block !important; width: 100%; padding: 0; }
            .card { border: none; box-shadow: none; padding: 5px 0; }
            body { background: white; padding: 0; font-size: 11px; }
            .report-table { font-size: 10px; }
            .report-table th, .report-table td { padding: 6px 5px; }
            .summary-box { border-radius: 0; border: 2px solid #000; }
            @page { margin: 15mm; }
        }
    </style>
</head>
<body>

<!-- VAHVISTUSMODAALI -->
<div id="confirm-modal">
    <div class="modal-box">
        <h2>Vahvista tallennus</h2>
        <p id="modal-info">Tarkista tiedot ennen tallennusta</p>
        <button id="modal-confirm-btn" class="btn-save" onclick="tallennaAjo()">TALLENNA (ENTER)</button>
        <button class="mini-btn" onclick="suljeModal()" style="margin-top:12px; width:100%; background:#f1f5f9;">PERUUTA</button>
    </div>
</div>

<!-- KIRJAUTUMISSIVU -->
<div id="auth-page">
    <h1>Päivyri v5.4</h1>
    <p>Ajopäiväkirja &amp; asiakasrekisteri</p>
    <button onclick="login()" class="btn-save" style="width:auto; padding:18px 40px; font-size:15px;">
        KIRJAUDU GOOGLELLA
    </button>
</div>

<!-- SOVELLUS -->
<div id="app-ui" style="display:none">
    <div id="sync-status" class="status-bar no-print">● Yhdistetään...</div>
    <div class="user-bar no-print">
        <span id="user-display">–</span>
        <button class="logout-btn" onclick="logout()">KIRJAUDU ULOS</button>
    </div>

    <div class="tabs no-print">
        <div class="tab active" id="tab-input" onclick="showPage('input')">Syöte</div>
        <div class="tab" id="tab-crm" onclick="showPage('crm')">Yritykset</div>
        <div class="tab" id="tab-report" onclick="showPage('report')">Raportit</div>
    </div>

    <!-- ===== SYÖTE ===== -->
    <div id="p-input" class="page active">
        <button class="mini-btn no-print" onclick="nollaaLomake()"
            style="background:var(--ac); color:white; width:100%; margin-bottom:12px; height:44px; border-radius:12px;">
            + UUSI TYHJÄ MERKINTÄ
        </button>
        <div class="card">
            <input type="hidden" id="f-id">

            <label>Päivä &amp; Tyyppi</label>
            <div style="display:flex; gap:10px;">
                <input type="date" id="f-date" class="e-nav" style="flex:1.5">
                <select id="f-type" class="e-nav" style="flex:1">
                    <option value="Tmi">Tmi</option>
                    <option value="Oy">Oy</option>
                    <option value="Oma">Oma</option>
                </select>
            </div>

            <label>Lähtö</label>
            <div style="display:flex; gap:10px;">
                <input type="number" id="f-ks" placeholder="Alku KM" class="e-nav" inputmode="decimal" style="flex:1">
                <input type="time" id="f-ts" class="e-nav" style="flex:1" onchange="laskePvraha()">
            </div>

            <label>Reitti / Asiakkaat</label>
            <div id="stops-container"></div>
            <button onclick="addStop()" class="mini-btn e-nav"
                style="background:#e2e8f0; width:100%; margin:6px 0; height:40px; border-radius:10px;">
                + LISÄÄ PYSÄHDYS
            </button>

            <label>Paluu</label>
            <div style="display:flex; gap:10px;">
                <input type="number" id="f-ke" placeholder="Loppu KM" class="e-nav" inputmode="decimal" style="flex:1">
                <input type="time" id="f-te" class="e-nav" style="flex:1" onchange="laskePvraha()">
            </div>

            <label>Päiväraha</label>
            <select id="f-allowance" class="e-nav">
                <option value="-">-</option>
                <option value="Osapäivä">Osapäivä (24 €)</option>
                <option value="Kokopäivä">Kokopäivä (51 €)</option>
                <option value="Ateria">Ateria (12,75 €)</option>
            </select>

            <button class="btn-save" onclick="avaaVarmistus()">TALLENNA MERKINTÄ</button>
        </div>

        <div id="history-list" class="no-print"></div>
    </div>

    <!-- ===== CRM ===== -->
    <div id="p-crm" class="page">
        <div class="card">
            <h3 id="crm-form-title" style="margin:0 0 5px;">Uusi asiakas</h3>
            <input type="hidden" id="c-id">
            <label>Yrityksen nimi *</label><input type="text" id="c-name" class="c-nav">
            <label>Y-tunnus</label><input type="text" id="c-ytun" class="c-nav" placeholder="1234567-8">
            <label>Osoite</label><input type="text" id="c-addr" class="c-nav">
            <label>Yhteyshenkilö</label><input type="text" id="c-person" class="c-nav">
            <label>Sähköposti</label><input type="email" id="c-email" class="c-nav">
            <label>Puhelin</label><input type="tel" id="c-phone" class="c-nav">
            <label>Muistiinpanot</label><textarea id="c-notes" class="c-nav" rows="2" placeholder="Vapaat muistiinpanot..."></textarea>
            <button class="btn-save" onclick="saveCrm()">TALLENNA ASIAKAS</button>
            <button id="crm-cancel-btn" class="mini-btn" onclick="resetCrm()"
                style="display:none; width:100%; margin-top:8px; background:#f1f5f9; color:#64748b;">
                PERUUTA MUOKKAUS
            </button>
        </div>

        <div class="card">
            <input type="text" id="crm-search" placeholder="🔍 Hae yritystä..." onkeyup="paivitaCrmLista()"
                style="margin-bottom:5px;">
            <div id="crm-list-container"></div>
        </div>
    </div>

    <!-- ===== RAPORTIT ===== -->
    <div id="p-report" class="page">
        <div class="card no-print">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div>
                    <label>Kuukausi</label>
                    <input type="month" id="rep-month" onchange="paivitaRaportti()">
                </div>
                <div>
                    <label>Yhtiö</label>
                    <select id="rep-type" onchange="paivitaRaportti()">
                        <option value="Kaikki">Kaikki</option>
                        <option value="Tmi">Tmi</option>
                        <option value="Oy">Oy</option>
                        <option value="Oma">Oma</option>
                    </select>
                </div>
            </div>
        </div>
        <div id="report-target"></div>
        <button class="btn-dark no-print" onclick="window.print()" style="margin-top:5px;">
            TULOSTA / ARKISTOI PDF
        </button>
    </div>
</div>

<datalist id="crm-datalist"></datalist>

<script>
// =============================================
// KONFIGURAATIO — Vaihda omasi tähän
// =============================================
const firebaseConfig = {
    apiKey: "AIzaSyCjoOqjTZxYoTA0b9HN-QAUB79pqHj5uBc",
    authDomain: "paivuri.firebaseapp.com",
    databaseURL: "https://paivuri-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "paivuri",
    storageBucket: "paivuri.firebasestorage.app",
    messagingSenderId: "602861240385",
    appId: "1:602861240385:web:f215c3b44388ddfe9346c0"
};

// =============================================
// HINNAT — Verohallinto 2026
// =============================================
const HINNAT = {
    "Osapäivä":  24.00,
    "Kokopäivä": 51.00,
    "Ateria":    12.75,
    "km":         0.55   // Verohallinto 2026 (2025: 0.59)
};

// =============================================
// ALUSTUS
// =============================================
firebase.initializeApp(firebaseConfig);
const db   = firebase.database();
const auth = firebase.auth();
let currentUser = null, omatAjot = [], asiakkaat = [];

// XSS-suojaus — käytä KAIKKIALLA innerHTML-interpoloinneissa
function esc(s) {
    if (!s) return '';
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

// =============================================
// KIRJAUTUMINEN
// =============================================
let loginInProgress = false;

function login() {
    if (loginInProgress) return;  // Estää useamman popup-kutsun
    loginInProgress = true;
    const btn = document.querySelector('#auth-page button');
    if (btn) { btn.disabled = true; btn.innerText = 'KIRJAUDUTAAN...'; }

    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
        .catch(err => {
            // cancelled-popup-request = uusi popup avattiin ennen kuin edellinen sulkeutui
            if (err.code === 'auth/cancelled-popup-request') return;
            // popup-closed-by-user = käyttäjä sulki popupin itse — ei virhe
            if (err.code === 'auth/popup-closed-by-user') return;
            alert('Kirjautumisvirhe: ' + err.message);
        })
        .finally(() => {
            loginInProgress = false;
            if (btn) { btn.disabled = false; btn.innerText = 'KIRJAUDU GOOGLELLA'; }
        });
}

function logout() {
    if (!confirm('Kirjaudutaanko ulos?')) return;
    auth.signOut().then(() => {
        document.getElementById('app-ui').style.display = 'none';
        document.getElementById('auth-page').style.display = 'flex';
    });
}

auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
        document.getElementById('auth-page').style.display = 'none';
        document.getElementById('app-ui').style.display = 'block';
        document.getElementById('user-display').innerText = user.email;
        asetaOletukset();
        alustaData();
    } else {
        document.getElementById('auth-page').style.display = 'flex';
        document.getElementById('app-ui').style.display = 'none';
    }
});

// =============================================
// DATA — Firebase-kuuntelijat
// =============================================
function alustaData() {
    const uid = currentUser.uid;

    db.ref('users/' + uid + '/ajot').on('value', s => {
        omatAjot = s.val() ? Object.values(s.val()) : [];
        paivitaHistoria();
        paivitaRaportti();
    });

    db.ref('users/' + uid + '/asiakkaat').on('value', s => {
        asiakkaat = s.val() ? Object.values(s.val()) : [];
        document.getElementById('crm-datalist').innerHTML =
            asiakkaat.map(c => `<option value="${esc(c.name)}">`).join('');
        paivitaCrmLista();
    });

    db.ref('.info/connected').on('value', s => {
        document.getElementById('sync-status').innerText =
            s.val() ? '● LINJOILLA (v5.4)' : '○ YHTEYS KATKENNUT';
    });
}

// =============================================
// OLETUSARVOT
// =============================================
function asetaOletukset() {
    const n = new Date();
    document.getElementById('f-date').value = n.toISOString().split('T')[0];
    const hhmm = n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
    document.getElementById('f-ts').value = hhmm;
    document.getElementById('f-te').value = hhmm;
    document.getElementById('rep-month').value = n.toISOString().substring(0, 7);
}

// =============================================
// ENTER-NAVIGOINTI
// =============================================
document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;

    // 1. Vahvistusmodaali — Enter tallentaa
    if (document.getElementById('confirm-modal').style.display === 'flex') {
        e.preventDefault();
        tallennaAjo();
        return;
    }

    // 2. Syöte-sivu
    if (document.getElementById('p-input').classList.contains('active')) {
        // Pysähdys-kentässä Enter lisää uuden pysähdyksen
        if (e.target.classList.contains('e-nav') && e.target.closest('.stop-row')) {
            e.preventDefault();
            addStop();
            return;
        }
        // Loppu-aika: Enter avaa vahvistusmodaalin
        if (e.target.id === 'f-te') { e.preventDefault(); avaaVarmistus(); return; }
        // Muissa kentissä: siirry seuraavaan
        const nav = Array.from(document.querySelectorAll('.e-nav')).filter(el => el.offsetParent !== null);
        const idx = nav.indexOf(e.target);
        if (idx > -1 && idx < nav.length - 1) { e.preventDefault(); nav[idx + 1].focus(); }
    }

    // 3. CRM-sivu — textarea ohitetaan (rivinvaihto sallittu)
    if (document.getElementById('p-crm').classList.contains('active')) {
        if (e.target.tagName === 'TEXTAREA') return;  // Anna rivinvaihdon toimia
        if (e.target.classList.contains('c-nav')) {
            const nav = Array.from(document.querySelectorAll('.c-nav')).filter(el => el.tagName !== 'TEXTAREA');
            const idx = nav.indexOf(e.target);
            if (idx === nav.length - 1) { e.preventDefault(); saveCrm(); }
            else { e.preventDefault(); nav[idx + 1].focus(); }
        }
    }

    // 4. Raportti-sivu — Enter päivittää raportin
    if (document.getElementById('p-report').classList.contains('active')) {
        e.preventDefault();
        paivitaRaportti();
    }
});

// =============================================
// SYÖTE — Pysähdykset
// =============================================
function addStop(val = '') {
    const div = document.createElement('div');
    div.className = 'stop-row';
    div.innerHTML = `
        <div class="stop-row-top">
            <input type="text" class="stop-input e-nav" value="${esc(val)}"
                placeholder="Asiakas / Kohde"
                onfocus="avaaStopHaku(this)"
                oninput="suodataStopHaku(this)">
            <button class="mini-btn" onclick="avaaStopHaku(this.previousElementSibling)"
                style="background:#e2e8f0; flex-shrink:0; padding:10px 10px;">🔍</button>
            <button class="stop-del" onclick="this.closest('.stop-row').remove()">✕</button>
        </div>
        <div class="stop-search-panel">
            <div class="stop-search-results"></div>
            <div class="stop-add-new" onclick="pikaUusiAsiakas(this.closest('.stop-row'))">
                ＋ Lisää uusi asiakas rekisteriin
            </div>
        </div>`;
    document.getElementById('stops-container').appendChild(div);
    if (!val) {
        div.querySelector('input').focus();
        avaaStopHaku(div.querySelector('input'));
    }
}

function avaaStopHaku(inputEl) {
    // Sulje muut avoimet paneelit
    document.querySelectorAll('.stop-search-panel.open').forEach(p => {
        if (p !== inputEl.closest('.stop-row').querySelector('.stop-search-panel')) {
            p.classList.remove('open');
        }
    });
    const panel = inputEl.closest('.stop-row').querySelector('.stop-search-panel');
    panel.classList.add('open');
    suodataStopHaku(inputEl);
}

function suodataStopHaku(inputEl) {
    const haku = (inputEl.value || '').toLowerCase();
    const panel = inputEl.closest('.stop-row').querySelector('.stop-search-panel');
    const results = panel.querySelector('.stop-search-results');
    const filtered = asiakkaat.filter(c =>
        !haku ||
        (c.name || '').toLowerCase().includes(haku) ||
        (c.addr || '').toLowerCase().includes(haku)
    ).slice(0, 8);

    if (filtered.length === 0) {
        results.innerHTML = '<div style="padding:10px 12px; color:#94a3b8; font-size:12px;">Ei tuloksia — lisää uusi alla</div>';
    } else {
        results.innerHTML = filtered.map(c => `
            <div class="stop-search-item" onclick="valitseAsiakas(this, '${esc(c.name)}')">
                ${esc(c.name)}
                <small>${esc(c.addr || '')}</small>
            </div>`).join('');
    }
}

function valitseAsiakas(itemEl, nimi) {
    const row = itemEl.closest('.stop-row');
    row.querySelector('input').value = nimi;
    row.querySelector('.stop-search-panel').classList.remove('open');
}

// Sulje hakupaneeli kun klikataan muualle
document.addEventListener('click', e => {
    if (!e.target.closest('.stop-row')) {
        document.querySelectorAll('.stop-search-panel.open').forEach(p => p.classList.remove('open'));
    }
});

function pikaUusiAsiakas(rowEl) {
    const nimi = prompt('Yrityksen nimi:');
    if (!nimi || !nimi.trim()) return;
    const osoite = prompt('Osoite (valinnainen):') || '';
    const uid = currentUser.uid;
    const ref = db.ref('users/' + uid + '/asiakkaat').push();
    ref.set({
        id: ref.key,
        name: nimi.trim(),
        addr: osoite.trim(),
        ytun: '', person: '', email: '', phone: '', notes: ''
    })
    .then(() => {
        rowEl.querySelector('input').value = nimi.trim();
        rowEl.querySelector('.stop-search-panel').classList.remove('open');
    })
    .catch(err => alert('Tallennus epäonnistui: ' + err.message));
}

// =============================================
// MODAALI — Vahvistus ennen tallennusta
// =============================================
function avaaVarmistus() {
    laskePvraha();
    const km = (parseFloat(document.getElementById('f-ke').value) || 0)
             - (parseFloat(document.getElementById('f-ks').value) || 0);
    const pvm  = document.getElementById('f-date').value;
    const type = document.getElementById('f-type').value;
    const all  = document.getElementById('f-allowance').value;
    document.getElementById('modal-info').innerText =
        `${pvm} | ${type} | ${Math.max(0, km).toFixed(0)} km | ${all}`;
    document.getElementById('confirm-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('modal-confirm-btn').focus(), 100);
}

function suljeModal() {
    document.getElementById('confirm-modal').style.display = 'none';
}

// =============================================
// TALLENNA AJO
// =============================================
function tallennaAjo() {
    const btn = document.getElementById('modal-confirm-btn');
    btn.disabled = true;

    const uid = currentUser.uid;
    const existingId = document.getElementById('f-id').value;
    const ajoRef = existingId
        ? db.ref('users/' + uid + '/ajot/' + existingId)
        : db.ref('users/' + uid + '/ajot').push();
    const id = existingId || ajoRef.key;

    const data = {
        id,
        date:      document.getElementById('f-date').value,
        type:      document.getElementById('f-type').value,
        ks:        parseFloat(document.getElementById('f-ks').value) || 0,
        ke:        parseFloat(document.getElementById('f-ke').value) || 0,
        ts:        document.getElementById('f-ts').value,
        te:        document.getElementById('f-te').value,
        allowance: document.getElementById('f-allowance').value,
        stops: Array.from(document.querySelectorAll('.stop-row input[type=text]'))
                    .map(i => ({ client: i.value.trim() }))
                    .filter(s => s.client)
    };

    ajoRef.set(data)
        .then(() => {
            suljeModal();
            btn.disabled = false;
            nollaaLomake();
        })
        .catch(err => {
            alert('Tallennus epäonnistui: ' + err.message);
            btn.disabled = false;
        });
}

// =============================================
// NOLLAA LOMAKE
// =============================================
function nollaaLomake() {
    document.getElementById('f-id').value = '';
    // Siirrä loppu-KM uudeksi alku-KM:ksi
    const ke = document.getElementById('f-ke').value;
    document.getElementById('f-ks').value = ke || '';
    document.getElementById('f-ke').value = '';
    document.getElementById('stops-container').innerHTML = '';
    document.getElementById('f-allowance').value = '-';
    asetaOletukset();
}

// =============================================
// HISTORIA (syöte-sivun alla)
// =============================================
function paivitaHistoria() {
    const sorted = [...omatAjot].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 7);
    document.getElementById('history-list').innerHTML = sorted.map(a => {
        const km = parseFloat(a.ke || 0) - parseFloat(a.ks || 0);
        const reitti = (a.stops || []).map(s => esc(s.client)).filter(Boolean).join(' → ') || '–';
        return `
        <div class="card history-item">
            <div class="info">
                <b>${esc(a.date)} | ${esc(a.type)}</b>
                <small>${Math.max(0, km).toFixed(1)} km | ${esc(a.allowance)} | ${reitti}</small>
            </div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
                <button onclick="editAjo('${esc(a.id)}')" class="mini-btn"
                    style="background:var(--ac);color:white">Muokkaa</button>
                <button onclick="vieKalenteriin('${esc(a.id)}')" class="mini-btn"
                    style="background:#f1f5f9;color:#0f172a;">📅 Kalenteri</button>
                <button onclick="poistaAjo('${esc(a.id)}')" class="mini-btn"
                    style="background:var(--err);color:white">✕</button>
            </div>
        </div>`;
    }).join('');
}

function vieKalenteriin(id) {
    const a = omatAjot.find(x => x.id === id);
    if (!a) return;
    const pvm   = (a.date || '').replace(/-/g, '');
    const ts    = (a.ts || '08:00').replace(':', '') + '00';
    const te    = (a.te || '09:00').replace(':', '') + '00';
    const km    = Math.max(0, parseFloat(a.ke || 0) - parseFloat(a.ks || 0)).toFixed(1);
    const reitti = (a.stops || []).map(s => s.client).filter(Boolean).join(' -> ') || 'Suora ajo';
    const title  = encodeURIComponent((a.type || '') + ' ' + km + ' km');
    const details = encodeURIComponent(
        'Reitti: ' + reitti +
        '\nMittari: ' + (a.ks || 0) + '-' + (a.ke || 0) +
        '\nPäiväraha: ' + (a.allowance || '-') +
        '\nKorvaus: ' + (a.type === 'Oma' ? 'yksityisajo, ei korvattava' : (km * HINNAT.km + (HINNAT[a.allowance] || 0)).toFixed(2) + ' €')
    );
    const url = 'https://www.google.com/calendar/render?action=TEMPLATE'
        + '&text=' + title
        + '&dates=' + pvm + 'T' + ts + '/' + pvm + 'T' + te
        + '&details=' + details;
    window.open(url, '_blank');
}

function poistaAjo(id) {
    if (!confirm('Poistetaanko ajo?')) return;
    db.ref('users/' + currentUser.uid + '/ajot/' + id).remove()
        .catch(err => alert('Poisto epäonnistui: ' + err.message));
}

function editAjo(id) {
    const a = omatAjot.find(x => x.id === id);
    if (!a) return;
    document.getElementById('f-id').value       = a.id;
    document.getElementById('f-date').value     = a.date;
    document.getElementById('f-type').value     = a.type;
    document.getElementById('f-ks').value       = a.ks;
    document.getElementById('f-ke').value       = a.ke;
    document.getElementById('f-ts').value       = a.ts || '';
    document.getElementById('f-te').value       = a.te || '';
    document.getElementById('f-allowance').value = a.allowance || '-';
    document.getElementById('stops-container').innerHTML = '';
    if (a.stops) a.stops.forEach(s => addStop(s.client));
    showPage('input');
    window.scrollTo(0, 0);
}

// =============================================
// CRM — Tallenna
// =============================================
function saveCrm() {
    const name = document.getElementById('c-name').value.trim();
    if (!name) return alert('Yrityksen nimi on pakollinen!');

    const uid = currentUser.uid;
    const existingId = document.getElementById('c-id').value;
    const crmRef = existingId
        ? db.ref('users/' + uid + '/asiakkaat/' + existingId)
        : db.ref('users/' + uid + '/asiakkaat').push();
    const id = existingId || crmRef.key;

    const data = {
        id,
        name,
        ytun:   document.getElementById('c-ytun').value.trim()   || '',
        addr:   document.getElementById('c-addr').value.trim()   || '',
        person: document.getElementById('c-person').value.trim() || '',
        email:  document.getElementById('c-email').value.trim()  || '',
        phone:  document.getElementById('c-phone').value.trim()  || '',
        notes:  document.getElementById('c-notes').value.trim()  || ''
    };

    crmRef.set(data)
        .then(() => {
            alert('Asiakas tallennettu!');
            resetCrm();
        })
        .catch(err => alert('Tallennus epäonnistui: ' + err.message));
}

function resetCrm() {
    document.getElementById('c-id').value     = '';
    document.getElementById('c-name').value   = '';
    document.getElementById('c-ytun').value   = '';
    document.getElementById('c-addr').value   = '';
    document.getElementById('c-person').value = '';
    document.getElementById('c-email').value  = '';
    document.getElementById('c-phone').value  = '';
    document.getElementById('c-notes').value  = '';
    document.getElementById('crm-form-title').innerText = 'Uusi asiakas';
    document.getElementById('crm-cancel-btn').style.display = 'none';
}

// =============================================
// CRM — Lista
// =============================================
function paivitaCrmLista() {
    const search = (document.getElementById('crm-search').value || '').toLowerCase();
    const filtered = asiakkaat.filter(c =>
        (c.name || '').toLowerCase().includes(search) ||
        (c.ytun || '').toLowerCase().includes(search) ||
        (c.addr || '').toLowerCase().includes(search)
    );
    document.getElementById('crm-list-container').innerHTML = filtered.length === 0
        ? '<p style="color:#94a3b8; text-align:center; padding:20px;">Ei tuloksia</p>'
        : filtered.map(c => `
            <div class="crm-item">
                <div class="crm-info">
                    <b>${esc(c.name)}</b>
                    <small>
                        ${c.ytun ? esc(c.ytun) + ' | ' : ''}${esc(c.addr || '–')}<br>
                        ${esc(c.person || '')}${c.person && c.phone ? ' | ' : ''}${esc(c.phone || '')}<br>
                        ${esc(c.email || '')}
                    </small>
                </div>
                <div class="crm-actions">
                    <button onclick="editCrm('${esc(c.id)}')" class="mini-btn"

function editCrm(id) {
    const c = asiakkaat.find(x => x.id === id);
    if (!c) return;
    document.getElementById('c-id').value     = c.id;
    document.getElementById('c-name').value   = c.name   || '';
    document.getElementById('c-ytun').value   = c.ytun   || '';
    document.getElementById('c-addr').value   = c.addr   || '';
    document.getElementById('c-person').value = c.person || '';
    document.getElementById('c-email').value  = c.email  || '';
    document.getElementById('c-phone').value  = c.phone  || '';
    document.getElementById('c-notes').value  = c.notes  || '';
    document.getElementById('crm-form-title').innerText = 'Muokkaa asiakasta';
    document.getElementById('crm-cancel-btn').style.display = 'block';
    showPage('crm');
    window.scrollTo(0, 0);
}

function poistaCrm(id) {
    const c = asiakkaat.find(x => x.id === id);
    if (!c) return;
    if (!confirm('Poistetaanko asiakas "' + c.name + '"?')) return;
    db.ref('users/' + currentUser.uid + '/asiakkaat/' + id).remove()
        .catch(err => alert('Poisto epäonnistui: ' + err.message));
}

// =============================================
// RAPORTTI
// =============================================
function paivitaRaportti() {
    const m = document.getElementById('rep-month').value;
    const t = document.getElementById('rep-type').value;
    if (!m) return;

    let data = omatAjot.filter(a => a.date?.startsWith(m));
    if (t !== 'Kaikki') data = data.filter(a => a.type === t);
    data.sort((a, b) => a.date.localeCompare(b.date));

    if (data.length === 0) {
        document.getElementById('report-target').innerHTML =
            '<div class="card" style="text-align:center;color:#94a3b8;padding:40px;">Ei ajoja valitulle kuukaudelle.</div>';
        return;
    }

    // Muotoile kuukausi suomeksi tulostusta varten
    const [vuosi, kkNum] = m.split('-');
    const kuukaudet = ['','Tammikuu','Helmikuu','Maaliskuu','Huhtikuu','Toukokuu','Kesäkuu',
                       'Heinäkuu','Elokuu','Syyskuu','Lokakuu','Marraskuu','Joulukuu'];
    const kuukausiTeksti = kuukaudet[parseInt(kkNum)] + ' ' + vuosi;

    let rows = '';
    let tKm = 0, tEur = 0, cOsa = 0, cKoko = 0, cAteria = 0;

    data.forEach((a, i) => {
        const km = Math.max(0, parseFloat(a.ke || 0) - parseFloat(a.ks || 0));
        const onOmaAjo = a.type === 'Oma';

        // Oma-ajolle EI lasketa korvauksia — yksityisajo, vain seuranta
        let korvaus = 0;
        if (!onOmaAjo) {
            korvaus = km * HINNAT.km;
            if (a.allowance === 'Osapäivä')  { korvaus += HINNAT['Osapäivä'];  cOsa++; }
            if (a.allowance === 'Kokopäivä') { korvaus += HINNAT['Kokopäivä']; cKoko++; }
            if (a.allowance === 'Ateria')    { korvaus += HINNAT['Ateria'];     cAteria++; }
        }
        tKm  += km;
        if (!onOmaAjo) tEur += korvaus;

        // Päivämäärä suomalaisessa muodossa
        const pvmOsat = (a.date || '').split('-');
        const pvmFi = pvmOsat.length === 3 ? pvmOsat[2]+'.'+pvmOsat[1]+'.'+pvmOsat[0] : esc(a.date);

        // Reitti — verottaja vaatii lähtö- ja kohdepaikat
        const pysahdykset = (a.stops || []).map(s => esc(s.client)).filter(Boolean);
        const reitti = pysahdykset.length > 0 ? pysahdykset.join(' → ') : 'Ei kirjattu';

        // Aika
        const aika = (a.ts && a.te) ? esc(a.ts) + '–' + esc(a.te) : '–';

        // Päiväraha-teksti
        const pvTeksti = (!onOmaAjo && a.allowance && a.allowance !== '-') ? esc(a.allowance) : '';

        // Oma-ajo merkitään harmaaksi taustaväriksi
        const rowBg = onOmaAjo ? '#f8fafc' : (i % 2 === 1 ? '#fafafa' : '');
        const korvausTeksti = onOmaAjo
            ? '<span style="color:#94a3b8;font-size:10px;">yksityisajo</span>'
            : '<b>' + korvaus.toFixed(2) + '</b>';

        rows += `
            <tr style="background:${rowBg}">
                <td style="white-space:nowrap"><b>${pvmFi}</b><br><small style="color:#94a3b8">${aika}</small></td>
                <td>${onOmaAjo ? '<span style="color:#94a3b8">●</span> ' : ''}${reitti}</td>
                <td style="white-space:nowrap;color:#64748b">${a.ks || 0}&nbsp;→&nbsp;${a.ke || 0}</td>
                <td style="text-align:right"><b>${km.toFixed(1)}</b></td>
                <td style="font-size:10px">${pvTeksti}</td>
                <td style="text-align:right">${korvausTeksti}</td>
            </tr>`;
    });

    const kmEur = (tKm * HINNAT.km).toFixed(2);
    const pvEur = (tEur - parseFloat(kmEur)).toFixed(2);
    const kmKorvausStr = HINNAT.km.toFixed(2).replace('.', ',');
    const nimitiedot = currentUser ? esc(currentUser.email) : '';

    document.getElementById('report-target').innerHTML = `
        <!-- TULOSTUS-OTSIKKO (näkyy printissä) -->
        <div style="margin-bottom:15px; padding-bottom:12px; border-bottom:2px solid #0f172a;">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:8px;">
                <div>
                    <div style="font-size:18px; font-weight:800;">AJOPÄIVÄKIRJA</div>
                    <div style="font-size:13px; color:#475569; margin-top:2px;">
                        ${kuukausiTeksti} — ${t !== 'Kaikki' ? esc(t) : 'Kaikki yhtiöt'}
                    </div>
                </div>
                <div style="text-align:right; font-size:11px; color:#64748b; line-height:1.8;">
                    <div>${nimitiedot}</div>
                    <div>Kilometrikorvaus: ${kmKorvausStr} €/km (Verohallinto 2026)</div>
                    <div>Tulostettu: ${new Date().toLocaleDateString('fi-FI')}</div>
                </div>
            </div>
        </div>

        <!-- PIKAYHTEENVETO RUUDULLA (ei tulostu) -->
        <div class="rep-grid no-print">
            <div class="rep-stat"><div class="val">${tKm.toFixed(1)}</div><div class="lbl">KM YHTEENSÄ</div></div>
            <div class="rep-stat"><div class="val">${tEur.toFixed(2)} €</div><div class="lbl">KORVAUKSET YHT.</div></div>
        </div>

        <!-- PÄÄASIALLINEN TAULUKKO -->
        <table class="report-table">
            <thead>
                <tr>
                    <th style="width:90px">PÄIVÄMÄÄRÄ<br>KLO</th>
                    <th>AJON TARKOITUS / REITTI</th>
                    <th style="width:95px">MITTARI<br>ALKU → LOPPU</th>
                    <th style="width:45px;text-align:right">KM</th>
                    <th style="width:75px">PÄIVÄRAHA</th>
                    <th style="width:55px;text-align:right">EUR</th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
            <!-- YHTEENSÄRIVI TAULUKON SISÄLLÄ -->
            <tfoot>
                <tr style="background:#f1f5f9; font-weight:800; border-top:2px solid #0f172a;">
                    <td colspan="3" style="font-size:11px;">
                        YHTEENSÄ ${data.length} ajoa
                        ${data.filter(a => a.type === 'Oma').length > 0
                            ? '<br><span style="font-weight:400;color:#94a3b8;font-size:10px;">(sis. ' + data.filter(a => a.type === 'Oma').length + ' yksityisajoa, ei korvattavia)</span>'
                            : ''}
                    </td>
                    <td style="text-align:right">${tKm.toFixed(1)}</td>
                    <td style="font-size:10px;">
                        ${cOsa > 0 ? 'Osa ' + cOsa + ' kpl' : ''}
                        ${cKoko > 0 ? 'Koko ' + cKoko + ' kpl' : ''}
                        ${cAteria > 0 ? 'Ateria ' + cAteria + ' kpl' : ''}
                    </td>
                    <td style="text-align:right">${tEur.toFixed(2)}</td>
                </tr>
            </tfoot>
        </table>

        <!-- YHTEENVETOLAATIKKO -->
        <div class="summary-box" style="margin-top:20px;">
            <table style="width:100%; font-size:12px; border:none; margin:0;">
                <tr>
                    <td style="border:none; padding:4px 0;">Kilometrikorvaus:</td>
                    <td style="border:none; padding:4px 0; text-align:right;">
                        ${tKm.toFixed(1)} km × ${kmKorvausStr} €/km
                    </td>
                    <td style="border:none; padding:4px 0; text-align:right; width:80px;">
                        <b>${kmEur} €</b>
                    </td>
                </tr>
                ${cOsa > 0 ? `<tr><td style="border:none;padding:4px 0;">Osapäiväraha (${cOsa} × ${HINNAT['Osapäivä'].toFixed(2).replace('.',',')} €):</td><td style="border:none;padding:4px 0;text-align:right;">–</td><td style="border:none;padding:4px 0;text-align:right;width:80px;"><b>${(cOsa * HINNAT['Osapäivä']).toFixed(2)} €</b></td></tr>` : ''}
                ${cKoko > 0 ? `<tr><td style="border:none;padding:4px 0;">Kokopäiväraha (${cKoko} × ${HINNAT['Kokopäivä'].toFixed(2).replace('.',',')} €):</td><td style="border:none;padding:4px 0;text-align:right;">–</td><td style="border:none;padding:4px 0;text-align:right;width:80px;"><b>${(cKoko * HINNAT['Kokopäivä']).toFixed(2)} €</b></td></tr>` : ''}
                ${cAteria > 0 ? `<tr><td style="border:none;padding:4px 0;">Ateriakorvaus (${cAteria} × ${HINNAT['Ateria'].toFixed(2).replace('.',',')} €):</td><td style="border:none;padding:4px 0;text-align:right;">–</td><td style="border:none;padding:4px 0;text-align:right;width:80px;"><b>${(cAteria * HINNAT['Ateria']).toFixed(2)} €</b></td></tr>` : ''}
                <tr style="border-top:2px solid #0f172a;">
                    <td style="border:none;padding:8px 0 0;font-size:14px;" colspan="2">
                        <strong>MAKSETTAVAA YHTEENSÄ</strong>
                    </td>
                    <td style="border:none;padding:8px 0 0;text-align:right;width:80px;">
                        <strong style="font-size:16px;">${tEur.toFixed(2)} €</strong>
                    </td>
                </tr>
            </table>
            <div style="margin-top:15px; padding-top:12px; border-top:1px solid #e2e8f0; font-size:10px; color:#94a3b8;">
                Allekirjoitus: _________________________ &nbsp;&nbsp; Päiväys: _________________
            </div>
        </div>`;
}

// =============================================
// PÄIVÄRAHA — Automaattinen laskenta
// =============================================
function laskePvraha() {
    const s = document.getElementById('f-ts').value;
    const e = document.getElementById('f-te').value;
    if (!s || !e) return;
    const [sh, sm] = s.split(':').map(Number);
    const [eh, em] = e.split(':').map(Number);
    let h = (new Date(0, 0, 0, eh, em) - new Date(0, 0, 0, sh, sm)) / (1000 * 60 * 60);
    if (h < 0) h += 24;
    const sel = document.getElementById('f-allowance');
    if (h >= 10)     sel.value = 'Kokopäivä';
    else if (h >= 6) sel.value = 'Osapäivä';
    else             sel.value = '-';
}

// =============================================
// NAVIGOINTI
// =============================================
function showPage(p) {
    document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.getElementById('tab-' + p).classList.add('active');
}
