<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v5.75</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --success: #10b981; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        .status-bar { font-size: 10px; text-align: center; padding: 6px; font-weight: 800; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 27px; z-index: 100; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 11px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: #fff; padding: 15px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 15px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 4px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; font-weight: 600; box-sizing: border-box; font-family: inherit; margin-bottom: 10px; }
        input:focus { border-color: var(--ac); outline: none; background: #f0f7ff; }
        .btn-save { background: var(--success); color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer; font-size: 16px; }
        .btn-toggle { background: #64748b; color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; font-weight: 800; cursor: pointer; font-size: 11px; }
        .crm-item { border-left: 4px solid var(--ac); padding-left: 10px; margin-bottom: 10px; font-size: 13px; position: relative; }
        .crm-item b { font-size: 15px; color: var(--ac); }
        .crm-info { color: #64748b; font-size: 12px; line-height: 1.4; }
        .delete-btn { position: absolute; right: 0; top: 0; color: #ef4444; font-weight: 800; cursor: pointer; padding: 5px; }
        @media print { .no-print { display: none !important; } .page { display: none !important; } #p-report { display: block !important; } }
    </style>
</head>
<body>

<div id="sync-status" class="status-bar no-print">LADATAAN...</div>

<div class="tabs no-print">
    <div class="tab active" id="t-input" onclick="showPage('input')">Syöte</div>
    <div class="tab" id="t-crm" onclick="showPage('crm')">Asiakkaat</div>
    <div class="tab" id="t-report" onclick="showPage('report')">Raportit</div>
</div>

<div id="p-input" class="page active">
    <div class="card">
        <input type="hidden" id="f-id">
        <label>Päivämäärä</label><input type="date" id="f-date">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Alku</label><input type="time" id="f-ts"></div>
            <div style="flex:1"><label>Loppu</label><input type="time" id="f-te"></div>
        </div>
        <label>Asiakas / Kohde</label>
        <input type="text" id="f-client-simple" placeholder="Esim. Asiakas Oy" list="crm-datalist">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>KM Alku</label><input type="number" id="f-ks"></div>
            <div style="flex:1"><label>KM Loppu</label><input type="number" id="f-ke"></div>
        </div>
        <label>Yritys</label>
        <select id="f-type"><option value="Tmi">Tmi</option><option value="Oy">Oy</option><option value="Oma">Oma</option></select>
        <button class="btn-save" onclick="tallennaPaiva()">TALLENNA</button>
        <button class="btn-toggle no-print" onclick="toggleArchive()">NÄYTÄ ARKISTO</button>
    </div>
    <div id="history-ui" style="display:none;" class="no-print"></div>
</div>

<div id="p-crm" class="page">
    <div class="card">
        <h3>Uusi Asiakas</h3>
        <label>Yrityksen nimi</label>
        <input type="text" id="c-name" class="crm-input" placeholder="Enter siirtää seuraavaan..." autofocus>
        
        <label>Osoite</label>
        <input type="text" id="c-addr" class="crm-input">
        
        <label>Yhteyshenkilö</label>
        <input type="text" id="c-contact" class="crm-input">
        
        <label>Puhelinnumero</label>
        <input type="tel" id="c-phone" class="crm-input">
        
        <label>Sähköposti</label>
        <input type="email" id="c-email" class="crm-input">
        
        <button class="btn-save" onclick="saveCustomer()">TALLENNA REKISTERIIN</button>
    </div>
    <div id="crm-list-container"></div>
</div>

<div id="p-report" class="page">
    <div id="report-target"></div>
</div>

<datalist id="crm-datalist"></datalist>

<script>
const firebaseConfig = { databaseURL: "https://paivuri-default-rtdb.europe-west1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let omatAjot = [], asiakkaat = [];

// Yhteys
db.ref(".info/connected").on("value", s => {
    document.getElementById("sync-status").innerText = s.val() ? "● LINJOILLA" : "○ OFFLINE";
});

// ENTER-SÄÄNTÖ CRM-KENTILLE
const crmInputs = document.querySelectorAll('.crm-input');
crmInputs.forEach((input, index) => {
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            if (index < crmInputs.length - 1) {
                crmInputs[index + 1].focus(); // Seuraavaan
            } else {
                saveCustomer(); // Viimeisessä tallennetaan
            }
        }
    });
});

function saveCustomer() {
    const data = {
        name: document.getElementById('c-name').value,
        addr: document.getElementById('c-addr').value,
        contact: document.getElementById('c-contact').value,
        phone: document.getElementById('c-phone').value,
        email: document.getElementById('c-email').value
    };
    if(!data.name) return alert("Nimi on pakollinen");
    
    db.ref('asiakkaat').push(data).then(() => {
        crmInputs.forEach(i => i.value = "");
        crmInputs[0].focus();
    });
}

db.ref('asiakkaat').on('value', s => {
    const data = s.val() ? s.val() : {};
    asiakkaat = Object.entries(data).map(([id, val]) => ({id, ...val}));
    
    // Päivitä listat
    document.getElementById('crm-datalist').innerHTML = asiakkaat.map(c => `<option value="${c.name}">`).join('');
    
    document.getElementById('crm-list-container').innerHTML = asiakkaat.map(c => `
        <div class="card crm-item">
            <span class="delete-btn" onclick="deleteCrm('${c.id}')">POISTA</span>
            <b>${c.name}</b><br>
            <div class="crm-info">
                ${c.addr ? '📍 ' + c.addr + '<br>' : ''}
                ${c.contact ? '👤 ' + c.contact + '<br>' : ''}
                ${c.phone ? '📞 ' + c.phone + '<br>' : ''}
                ${c.email ? '📧 ' + c.email : ''}
            </div>
        </div>
    `).reverse().join('');
});

function deleteCrm(id) { if(confirm("Poistetaanko asiakas?")) db.ref('asiakkaat/' + id).remove(); }

// Syötteen tallennus
function tallennaPaiva() {
    const id = document.getElementById('f-id').value || "p_" + Date.now();
    const data = {
        id, date: document.getElementById('f-date').value,
        ts: document.getElementById('f-ts').value, te: document.getElementById('f-te').value,
        ks: parseFloat(document.getElementById('f-ks').value) || 0,
        ke: parseFloat(document.getElementById('f-ke').value) || 0,
        type: document.getElementById('f-type').value,
        simpleClient: document.getElementById('f-client-simple').value
    };
    db.ref('ajot/' + id).set(data).then(() => { location.reload(); });
}

function showPage(p) {
    document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.getElementById('t-' + p).classList.add('active');
}

function toggleArchive() {
    const ui = document.getElementById('history-ui');
    ui.style.display = ui.style.display === 'none' ? 'block' : 'none';
}

db.ref('ajot').on('value', snap => {
    omatAjot = snap.val() ? Object.values(snap.val()) : [];
    // Tässä kohtaa arkiston ja raportin generointi v5.74 tyyliin...
});

document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
